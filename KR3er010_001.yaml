body:
  text: 卷一一卒尸脈寸口沉大而滑沉則為實滑則為氣實氣相搏厥氣入臟則死入腑則愈唇青身冷為入臟死身和汗自出為入腑則愈緊而急者為遁尸少陰不至腎氣衰少精血為尸厥跌陽脈不出脾不上下身冷硬呼之不應脈絶者死脈當大反小者死證治在外者可治入里者死血氣並走於上則為厥暴死素有痼疾新加卒病先治卒病尸厥者昏不知人脈動如故開上焦心肺之陽自愈尸厥脈動無氣氣閉靜而死也以菖蒲屑內鼻兩孔中吹之令人以桂屑放舌下又方剃取左角發方寸燒末酒和灌入喉立起救卒死身熱者驗方礬石半斤以水一斗五升煮消浸腳令沒踝蓋取礬性收澀而斂其厥逆之氣還魂湯治卒死客忤氣麻黃三兩去節杏仁八十個去皮尖炙甘草一兩上三味水八升煮取三升去渣入薑汁少許令咽之蓋取辛甘通陽氣發越邪氣故也救卒死目閉方搗薤汁灌耳中妙或吹皂莢末於鼻中立效薤汁辟邪安魂莢末取嚏開竅救卒死張口反折方灸手足兩爪後十四壯飲以五毒諸膏散外有中惡中氣中食等狀與卒尸相類須詳諦脈證而投之慎勿泛視誤人倉卒變通在神法難畢述二痹脈寸口喘而堅痹在心喘而浮痹在肺長而左右彈痹在肝大而虛痹在脾堅而大痹在腎因風風為行痹風性善行寒寒為痛痹寒主收引濕濕為著痹濕本重滯三氣致痹之原或外兼他患有之若舍此而能痹未有也證其合而為痹也以冬遇者骨痹春遇者筋痹夏遇者脈痹長夏遇者肌痹秋遇者皮痹久而不去內舍五臟之合待舍其合難治矣痹論中議痹乃三氣皆可客於五臟其風寒濕乘虛而客之故也筋痹不去內舍於肝皮痹不去內舍於肺肌痹不去內舍於脾脈痹不去內舍於心骨痹不去內舍於腎其客於心則煩心上氣嗌乾恐噫厥脹是也其客於肺使人煩滿而喘吐其客於肝多飲數溲小腹痛如懷妊夜臥則驚其客於脾四肢解墮發渴嘔沫上為大塞其客於腎善脹尻以代踵脊以代頭其客於腸數飲而小便不得中氣喘爭時發飧泄夫大腸乃傳道之官為沖和之氣三氣乘虛客之而和氣閉矣水道不通使糟粕不化故喘爭飧泄也其客於胞小腹膀胱按之內痛若沃以湯小便澀上為清涕夫三氣客於胞中則氣不能化出故胞滿而水道不通隨經出鼻竅其客於血脈隨脈流通上下升降一身謂之周痹華他論痹乃邪氣合四時不正之氣感於臟腑所為有氣血筋肉骨之分其氣痹者愁思喜怒過則氣結於上久而不消則傷肺正氣衰邪氣勝留於上則胸腹痛而不能食注於下則腰腳重而不能行貫於舌則不言遺於腹則不溺壅則痛流則麻右寸脈沉而遲澀者是也其血痹者飲酒過多懷熱太甚或寒折於經絡或濕犯於營衛因而血搏漸成枯削失血之證左寸脈結而不流利是也其肉痹者飲食不節肥美之為肉不榮膚不澤則紋理疏三氣入之則四肢緩而不收持右關脈舉按皆無力而澀也其筋痹者由叫怒無時行步奔急淫邪傷肝肝失其氣寒熱客之流入筋會使筋急而不舒左關脈弦急而數浮沉有力是也其骨痹者乃嗜欲傷於腎氣內消而不能閉禁邪氣妄入脈遲則寒數則熱浮則風濡則濕滑則虛治法各隨其宜麻木余辨是風濕熱下陷入血分陰中陽氣不行其證合目則渾身麻亦有痰在血分癢者血不營肌腠治附子湯治風寒濕痹附子炮去皮臍桂枝白芍甘草茯苓人參各三錢白朮一兩行痹加麻黃桂湯痛痹加附子薑茯湯胞痹加四苓腸痹加平胃茱萸草肉豆蔻等戴人法苦劑湧寒痰次與痰劑使白朮除濕茯苓養腎水桂伐木薑附寒勝加麻木方人參助陽道當歸行陰生甘草去熱白朮茯苓除濕熱升麻柴胡白芍蒼朮黃柏痰加二陳忍冬藤膏治五痹拘攣三痓即痙也脈太陽發熱脈反沉細難愈太陽證備脈沉遲此為痙寸口脈直上下行伏堅緊如弦沉弦沉緊少陰脈緊暴微者欲解因血氣內虛四氣外襲因濕諸痙項強皆屬於濕寒濕同性故濕可傷太陽三因論狀身熱足寒頭強項急惡寒時頭熱面赤目赤脈獨頭搖動卒噤角弓反張皆因血虛筋無所養邪因入之故寒則緊縮熱則弛張風則弦急濕則脹緩又有因瘡口未合風入之為破傷風濕入之為破傷濕與痙同但少頭強項急余並相如又有因汗下過多又有産後怒氣致此病者項強亦有痰者證有汗而不惡寒名柔痙無汗口噤腳攣名剛痙治宜流濕祛風緩表而安詳有無汗而藥之柔痙葛根加桂湯剛痙大承氣湯葛根湯汗之有表證可用大承氣下之有里證可用四痿脈浮而大浮虛大熱滑而大滑痰大虛洪而緩洪熱緩虛因腎水不能勝心火火上爍肺金六葉皆焦皮毛虛弱急而薄著者則生痿躄皆因貪欲好色之故濕痰亦能為之經論有由悲哀太甚陽氣內動數溲血大經空虛熱起於心病則樞紐如折不相提挈名曰脈痿有思想無窮入房太甚宗筋弛縱熱入於肝病則筋急而爪枯名曰筋痿有由濕地以水為事熱生於脾病則胃干而渴肌肉不仁名曰肉痿有因遠行勞倦遇大熱而渴陽氣內乏熱舍於腎病則腰脊不舉骨枯而髓減名曰骨痿然此皆熱熏於肺之為也火上炎肺治節不行而痿躄矣證面黃身熱肌瘦往來寒熱涎嗽喘滿面浮弱而不用者為痿外有痿即軟風也柔風腳弱病同而證各異治治獨取陽明陽明者胃脈也五臟六腑之海主潤宗筋宗筋主束骨利機關也故陽明虛而然張以黃連解毒湯加歸等劑治之李以甘寒瀉火苦寒瀉濕熱四君子補陽明虛清暑益氣治之濕痿之為病宜二陳湯加朮苓柏治之清暑益氣湯治熱傷肺氣虛成痿黃耆一錢汗少減半暑邪干衛身熱自汗甘溫補之人參救火傷氣白朮各半錢白蒼朮一錢除濕甘草炙三錢益氣當歸三錢升麻一錢酒潤甘平潤肌熱風勝濕葛根二錢陳皮半錢澤瀉半錢滲濕神麯半錢消食去痞五味九分酸寒收暑傷金麥門冬三錢青皮二錢半黃柏三錢補水瀉熱或加知母黃芩健步丸治濕熱成痿羌活防風柴胡滑石炙甘草生薑酒洗各半兩澤瀉五錢防己酒製一兩川烏苦參酒洗肉桂一錢愈風湯下祕方氣虛四君子加蒼白朮苓柏痰加竹瀝血虛四物湯濕痰二陳湯加蒼白朮苓柏竹瀝下補陰丸經論喑痱乃腎虛也舌不語腎脈挾舌本腎氣厥不至足不行腎氣不順五厥脈沉微而不數謂之寒厥沉伏而數謂之熱厥因因虛因痰因熱因寒證厥當分兩種次分五臟寒厥為手足寒也陰氣勝則寒其由乃恃壯縱欲於秋冬之間則陽奪於內精氣下溢邪氣上行陽衰精竭陰獨行故為寒厥熱厥為手足熱也陽氣勝則熱其由乃醉飽入房氣聚於脾胃陰虛陽氣入則胃不和胃不和則精竭精氣竭則四肢不榮酒氣與穀氣相搏則內熱而溺赤腎氣衰陽獨勝故為熱厥五心煩熱有小腸熱者有心虛而熱者厥亦有腹暴滿不知人者或一二日稍知人者或卒然衰亂者皆因邪氣亂陽氣逆是少陰腎脈不至也腎氣衰少精氣奔逸使風促迫上入胃膈宗氣反結心下陽氣退下熱歸股腹與陰相助令人不仁又五絡皆會於身五絡俱絶則令人身脈俱動而形體皆無所知其狀如尸故曰尸厥正由臟器相亂或與外邪相忤則氣鬱不行閉於經絡諸脈伏匿昏不知人厥有痰如曳鋸聲在咽中為痰厥骨枯爪痛為骨厥身直如椽為骭厥因醉而得為酒厥暴怒而得為氣厥手足搐搦為風厥喘而狂走為陽明厥此皆氣逆之所為也治李法痰用白朮竹瀝熱用承氣下之氣虛補氣四君子血虛補血四物張法降心火益腎水通血和氣必先湧之六傷寒脈陽浮而陰弱謂之傷風邪在六經俱強加之風傷陽故浮虛陽浮衛中風也陰弱營氣弱也浮緊而無汗謂之傷寒寒傷營營實則衛虛寒傷陰故堅牢陽緊邪在上焦主欲嘔陰緊邪在下焦必欲利脈浮頭項痛腰脊強病在太陽脈長身熱目痛鼻乾病在陽明脈弦胸脅痛而耳聾病在少陽脈俱沉口燥舌乾邪在少陰脈俱微緩煩滿囊縮邪在厥陰脈俱沉細嗌乾腹滿邪在太陰脈陰陽俱盛重感於寒而緊澀變為溫瘧陰陽俱盛傷寒之脈前病熱未已後寒復盛也脈陽浮滑陰濡弱更遇於風乘變為風溫陽浮而滑陰濡而弱皆風脈也前熱未歇風來乘熱脈陽洪數陰實大遇濕熱兩合變為溫毒洪數實大皆兩熱相合脈陽濡陰弱而陰弦緊更遇溫氣變為溫疫病發熱脈沉而細表得太陽名曰痙病太陽身熱疼脈微弱弦芤名曰中暍病若發汗已身灼然熱名曰風溫風溫為病脈陰陽俱浮自汗出身重多眠睡鼾語難以小便不利更被其下若被火者微發黃色劇者則驚癇時瘛瘲若火熏則死病太陽關節疼痛而煩脈沉細名曰濕痹脈沉細而疾身冷則四肢冷煩躁不欲飲水狂悶名是陽厥脈當有神不問數極遲敗當中有力即有神焉神者血氣之先傷寒熱甚脈浮大者生沉小者死已汗沉小者生浮大者死溫病二三日體熱腹滿頭痛飲食如故脈直而疾者八日死溫病八九日頭身不痛目不赤色不變而反利脈來牒牒按之不彈手時大心下堅十七日死溫病四五日頭痛腹滿而吐脈來細強十二日死溫病汗不出出不至足者死厥汗出腎脈強急者生虛緩者死溫病下利腹中痛甚者死熱病七八日不汗躁狂口舌暴燥焦黑脈反細或代者死八日以上反大熱死邪勝故也熱病七八日當汗反下脈絶者死熱病得汗脈躁者死脈轉大者死厥逆呼之不應脈絶者死陽厥有力者生陰厥按之大者生熱病七八日脈不躁喘不數後三日中有汗不汗者四日死熱病脈澀小疾腹滿䐜脹身熱不得大小便死熱病脈浮大絶喘而短氣大衄不止腹中疼死熱病脈浮洪腸鳴腹滿四肢清注泄死熱病脈絶動疾便血奪形肉身熱甚死熱病脈小疾咳喘眩悸奪形肉身熱死熱病腹脹便血脈大時時小絶汗出而喘口乾視不見者死熱病脈轉小身熱甚死熱病脈轉小身熱甚咳而便血目陷妄言循衣縫躁擾不臥死熱病嘔血咳而煩滿身黃腹鼓脹泄不止脈絶死熱病瘛瘲狂走不能食腹滿胸痛引腰脊嘔血死脈浮而洪邪氣勝也身體如油正氣脫也喘而不休水漿不下胃氣盡也體麻不仁營衛不行乍靜乍亂正邪爭也故為命絶也熱病喘咳唾血手足腹腫面黃振栗不言名肺絶死丁日死後仿此熱病頭痛嘔宿汁嘔逆吐血水漿不入口狂妄腹大滿名脾絶死熱病煩滿骨痛嗌腫不可咽欲咳不能咳歌笑而哭名心絶死熱病僵臥足不安地嘔血血妄行遺屎溺名肝絶死熱病喘悸吐逆骨痛短氣目視不明汗如珠腎絶死太陽病脈反躁盛是陰陽交死得汗脈靜者生少陰病惡寒而蜷下利手足逆者死又吐利躁逆者死少陰病四逆惡寒而蜷其脈不至不煩而躁者死少陰病下利止而頭眩時時自冒者死又七八日息高者死少陰病脈微沉細但欲臥汗出不煩自欲吐五六日自利煩躁不得臥寐者死若利止惡寒而蜷手足溫者可活少陰病下利止厥逆無脈不煩服湯藥其脈暴出者死微續者生傷寒下利厥逆躁不得臥者死下利至厥不止者死傷寒厥逆六七日不利便發熱而利者生汗出利不止者死有陰無陽故也傷寒五六日不結胸腹濡脈虛復厥者不可下下之亡血死熱病不知所痛不能自收口乾陽熱甚陰頗有寒者死熱病在腎渴口乾舌燥黃赤日夜飲水不知腹大脹尚飲目無精光者死傷寒下利日十餘行脈反實者死病者脅下素有痞而下至於臍旁痛引小腹入陰挾筋為臟結者死結胸證具而煩躁者死直視譫語喘滿者死若下利亦死因房勞辛苦之過腠理開泄少陰不藏觸冒冬時殺厲之氣嚴寒之毒中而即病曰傷寒不即病寒毒藏於肌膚之間至春變為溫至夏變為熱病皆腎水涸春無以發生故也皆熱不得發泄鬱於內遇感而發雖曰傷寒實為熱病春病溫疫夏為熱病及飧泄秋髮痎瘧冬生咳嗽皆因感四時不正之氣總名之曰傷寒證治自外而入內傳經絡太陽證頭疼發熱惡寒腰脊強脈浮而緊無汗謂之傷寒可汗宜麻黃湯脈緩自汗謂之傷風宜桂枝湯忌利小便重汗下大便陽明證身熱目疼鼻乾不得臥不惡風寒而自汗尺寸脈俱長宜白虎湯浮沉按之有力宜大承氣湯胃血也不主汗利忌汗利小便少陽證往來寒熱胸脅痛而嘔耳聾脈弦宜和解之小柴胡湯膽無出入水火之間下犯太陽汗下利皆不可忌利小便忌汗忌利大便太陰證腹滿咽乾手足自溫自利不渴時腹痛脈沉細其臟寒宜四逆湯脈浮可汗宜桂枝湯又大實痛可下用詳忌三法宜三法用詳少陰證口噤舌乾而渴脈沉實宜大承氣湯脈沉細遲者宜用溫之四逆湯身涼脈沉細而虛宜瀉心湯身熱煩躁不寧大小便自利脈浮洪無力按之全無宜附子瀉心湯其吐瀉不渴脈浮弱理中湯主之渴而脈沉有力而疾宜五苓散少陰證脈沉發熱當汗麻黃細辛附子湯少陰證下利色不青當溫色青口燥當下脈弱忌下乾燥忌汗厥陰證煩滿而囊縮大小便不通發熱引飲腹滿脈俱微沉實按之有力當下無力當溫厥陰乃二陰交盡曰厥陰為生化之源喜溫而惡清大抵三陰非胃實不可下此三陰無傳經止胃實可下也太陽標本不同標熱太陽發熱本寒膀胱惡寒故宜汗陽明從中氣標陽肌熱本實妄語標陽故宜解肌本實故宜下少陽標陽發熱本火惡寒前有陽明後有太陰故宜和解太陰標陰本濕腹脹滿或嗌乾身目黃從標治則溫從本治宜泄滿下濕少陰標陰爪甲清冷本熱脈沉實口乾渴標宜溫本宜下厥陰中氣宜溫煩滿囊縮故為熱宜苦辛下之麻黃桂枝之輩汗而發之葛根升麻之屬因其輕而揚之三承氣陷胸之輩引而竭之瀉心十棗之類中滿泄之在表宜汗在裡宜下在半表半裡宜和表多里少和而少汗之里多表少和而微下之在上者吐之中氣與脈氣微者溫之脈亦同法又當求本假令腹痛用桂枝芍藥湯何不只用芍藥卻於桂內加之要知從太陽中來故太陽為本又如結胸麻黃亦然劉法分病及脈以五臟言之諸在皮者汗之麻黃湯內加表之在內者下之麻黃細辛附子湯內加下之此言藏者五臟也可通經入臟物之藏者腑也方可下麻黃湯治外證之外麻黃細辛附子湯治內證之外肝脈外證善潔面青善怒脈弦前方加羌活防風三錢內證滿祕便難淋溲轉筋沉而弦後方加同前心脈外證面赤口乾善笑脈沉而洪前方加黃芩石膏各三錢內證煩心心痛掌中熱而噦脈沉後方加同前肺脈外證面白善嚏悲愁欲哭脈浮而澀前方加薑桂各三錢內證喘咳灑淅寒熱脈沉後方加生薑桂枝脾脈外證面黃善噫善思味脈浮而緩前方加白朮漢防己內證腹脹滿食不消怠惰脈沉後方加同前腎脈外證面黑善恐脈浮前方加附子生薑內證泄如注下重脛寒脈沉後方加同前以前外證皆表之表汗而發之內證者里之表也漬形以汗如脈沉復有里證里證為發熱引飲便利赤澀泄下赤水或祕按之內痛此為里證宜速下之依方加大黃三錢如邪又未盡復加大黃二錢劉張又相繼論人多勞役飢飽者得之火化火擾治之宜以辛涼比及年少性急勞役豈非火乎遲脈年老之人可以辛溫解之故制雙解散治諸傷寒時氣在表裡皆可服之表裡證有相似藥不可差傷寒表證發熱惡寒而渴獨頭痛身熱目疼鼻乾不得臥乃陽明經病也白虎湯主之雜證里證亦同但目赤者臟病也脈亦洪大甚則吐血先有形也乃手太陰肺不足不能管領陽氣亦以枸杞地黃等物治之補瀉當察虛實假如洪弦相雜洪客也弦主也子能令母實又脈弦無表證是東方實西方虛也又前來者為實邪依此補瀉余仿此行之表汗通聖散雙解散半表半裡涼膈散柴胡湯里下右手脈實承氣湯左手脈實抵當湯不分浮沉但實可用血氣俱實主三承氣湯溫四逆湯真武湯解利五苓散解毒散白虎湯甘露飲梔子湯發黃茵陳湯傷寒得傷風脈傷風得傷寒脈假如太陽證頭疼身熱自汗惡風脈當緩而反緊是傷風得傷寒脈也余以例推之桂枝麻黃各半湯羌活湯尤妙吐瓜蒂散瓜蒂赤小豆豆豉湯下一錢結胸脈浮大者不可下之下之必死小陷胸湯半夏連薑汁炒栝蔞實大陷胸湯炒大黃五錢苦葶藶炒三錢芒硝一錢杏仁十二個丸如彈子大每服一丸入甘遂末三字蜜半匙水煎至半溫服六經餘證太陽痙汗多熱利誤下變證陽明煩躁火入於肺煩也火入於腎躁也梔子豆豉湯宿食加大黃狂譫實熱發斑胃火嘔吐噦少陽潮熱有平旦日晡之分詳見前太陰腹痛有部分同雜證治痞有虛實實便祕厚朴枳實虛便利白芍少陰心驚悸是雜證吐瀉同霍亂證治咽喉熱甘草桔梗寒熱合二方下利色青下色不青溫渴逆乃陰消陽逆或兼以舌攣語言不正昏冒咽痛大承氣厥陰羌活湯厥利傷寒不問何經辨兩感傷寒之例羌活防風川芎甘草炙芩各一錢地黃細辛二錢半白朮二錢如身熱加石膏四錢腹痛加芍藥三錢半往來寒熱加柴胡一錢半夏五錢心下痞加枳實一錢里證加大黃三錢邪去止之治疫麻黃一兩甘草一兩半石膏滑石黃芩白朮各四兩煎服表汗解利大羌活湯治兩感傷寒出李防風羌活獨活防己白朮甘草炙黃芩黃連蒼朮川芎細辛各三錢知母生地黃各一兩白芷陽明加之雙解散混解不問風寒出張李劉皆用梔子豉湯出李消毒飲治疫癘時毒黃芩黃連各半兩連翹一錢陳皮玄參各三錢甘草黍黏子板藍根馬勃各一錢人參殭蠶各一錢桔梗三錢升麻七錢柴胡五錢薄荷川芎各五錢大黃便硬加之以水煎服傷寒中寒説傷寒為外寒鬱內熱傷寒面慘而不舒惡寒不惡風中寒謂寒乘其膚腠不分經絡疏豁一身無熱可發溫補自安此胃氣之大虛也風濕不可下論春夏之交病如傷寒自汗肢體重痛轉側難小便不利此名風濕非傷寒也因陰雨卑濕或引飲多有此證宜多與五苓散切忌汗下四證類傷寒傷寒右寸脈緊盛痞滿腳氣如傷寒證但病起於腳胯痰證嘔逆頭痛脈浮而滑痞滿虛煩不惡寒不頭痛身疼陽毒身重腰脊痛狂言或吐血下利脈浮大數咽喉痛唾血面赤如錦紋五六日可治陰毒身重背強腹中絞痛咽喉不利毒氣攻心心下堅嘔逆唇青面黑四肢冷脈沉細緊數身如打五六日可治陰盛格陽目赤煩躁不渴或渴不欲水脈七八至按之不鼓薑附主之陽盛拒陰身表涼痛四腳冷諸陰證脈沉數而有力承氣主之陽厥極深或時鄭聲指甲面色青黑勢困脈附骨按之有舉之無因陽氣怫鬱不得榮運於四肢以至身冷先涼膈養陰退陽以待心胸微曖可承氣下之陰證身靜重語無聲氣難布息目睛不了了鼻中呼不出吸不入口鼻中氣冷水漿不入口二便不禁面上惡寒如有刀刺陽證身動輕語有聲目睛了了鼻中呼吸出入能往能來口鼻氣熱傷風氣出粗合口不開面光而不慘惡風不惡寒傷食口無味液不納息肩兩感一日太陽受之即與少陰俱病頭疼口乾煩滿而渴者是二日陽明受之即與太陰俱病腹滿身熱不飲食譫語三日少陽受之即與厥陰俱病煩滿囊縮水漿不入口不知人六日死痙太陽病發熱無汗反惡寒者名剛痙無汗為表實惡寒為重感故名剛痙太陽病發熱有汗不惡寒者為柔痙表虛傷濕其病身熱足寒頸項強急惡寒時頭熱面赤目脈赤頭搖卒口噤背反張中濕見前脈其病一身盡黃頭痛汗出欲水而不能飲反欲近火頭汗乃邪搏諸陽熱不得越津液上湊又見自汗條下手足汗有邪聚於胃則便硬有寒則便溏不能食小便不利煩躁有熱傳於內胸中有熱關前洪數宜解熱有虛因汗吐下虛協餘熱身不疼脈不緊數宜補之又初解胃弱強食胃脈浮洪苔皆心經之熱淺深也白而滑乃邪在半表半裡也白而澀熱在裡也黃而干熱在胃也黑者宜下噦皆胃疾或寒或妄下之虛厥手足冷有寒有熱先熱而後厥者熱伏於內先厥而後熱者陰退陽氣復始得之便厥皆陽不足而陰勝也所主為寒譫語四證傷寒譫語屬陽明經乃胃有熱脈洪大者是宜調胃承氣湯身不熱身困者謂之鄭聲病退人虛脈和平宜滋補婦人經來適邪氣乘虛入於血海左關脈數者小柴胡湯主之有邪祟者言語涉邪頗有意思狀多變與病相違者是氣喘七證傷寒太陽證下之微喘者內虛外熱故也宜解其表飲水過多水停心下胸膈滿而喘者宜利其小便病本無喘因藥下之瀉止而喘其色已脫不治喘而四逆者不治喘而噫者不治喘而魚口者不治喘而目閉面黑者不治目瞪四證傷寒至目瞪不省人事此中風痙證以藥開關吐痰痙退眼開隨證治之傷寒病已過經痙退無熱人困不語脈和目瞪謂之戴陽下虛故也陽毒不解熱毒之氣伏於太陽之經故使目瞪六脈弦徑漸作魚口氣粗者死太陰痰潮上灌七竅兩目瞪與小兒驚風之類同下痰則愈舌卷唇焦乃心肝熱極三焦精液不生可治舌卷卵縮厥陰絶也必也厥陰幽悶三證陰毒陽冷四肢逆冷心膈幽悶默默思睡脈沉伏者是傷寒起汗下後又戰汗過多人困身冷不動者乏陽也傷寒未三日身冷額上汗出面赤心煩者非陰毒證謂之陰勝格陽陰氣並於外陽氣伏於內其脈沉數也咽乾兩證少陽證口苦咽乾乃膽熱也小柴胡湯少陰證口燥咽乾主腎熱津液不生宜下惡寒三證發熱惡寒發於陽脈浮數宜麻黃桂枝汗之無熱惡寒發於陰脈沉細宜四逆溫里發汗後反惡寒氣虛也脈微弱補虛芍藥附子甘草湯主之惡風三證汗出而脈緩宜桂枝加葛根湯便遍身潤太陽病發汗過多亡陽衛虛惡風當溫其經宜桂枝加附子湯風濕相搏骨節煩痛不得屈伸汗出惡風不欲去衣宜甘草附子湯汗後發熱並再傷八證發汗不入格其病不解宜再汗之發汗後再傷風邪而熱宜發汗再傷風寒而熱隨證治之汗後溫之熱脈弦小而數者有餘熱也宜和解之汗後溫之熱脈靜身無痛處虛熱也宜平補之汗後溫之熱或渴或煩或胸滿或腹急有里證脈沉數宜下之勞力而再熱平解勞倦宜柴胡鱉甲散食過而熱者宜消化其食中暍夏月發熱惡寒小便己灑然毛聳脈弦細而芤遲宜白虎人參湯忌汗下中暑背寒面垢手足微冷煩躁引飲四肢不痛脈浮宜五苓白虎中溫冬月冒寒至春再感乖常之氣風溫先傷風後傷溫頭疼自汗體重息如喘但默默欲眠尺寸脈俱浮風溫脈浮證同前條下溫毒汗吐下表未罷毒邪入臟身有斑脈陽洪數陰實大濕溫先傷濕後中暑瘟疫衆人一般脈陽虛弱陰弦緊潮熱陽明申酉時分也胃實宜下寒熱相繼在他時太陽病熱在寅卯少陽在巳午汗自出太陽經自汗營弱衛強也中風太陽脈緩風溫身重多睡脈浮緩風濕脈沉而細證同前條下少陰咽痛拘急四肢疼厥逆自汗亡陽也太陽亡陽自汗柔痙同前痙下除中者死傷寒六七日脈遲下利而熱反與黃芩湯撤其熱腹中惡冷當不能食今反能食名曰除中脾經受邪則下利而熱反與黃芩邪熱未去而胃氣先去禁忌厥陰心痛發斑不欲食食則吐蛔下則利不止諸四肢厥逆不可下五六日不結胸腹痛滿脈虛復厥者不可下當下反汗之必口爛少陰脈沉細數病在裡忌汗微者忌汗尺脈弱澀者不可下之太陰腹滿吐食不下自利時腹自痛忌下下之胸下結硬脈弱自便利雖用下宜減之少陽不可汗忌利小便忌利大便犯之各隨上下前後本變及中變諸變例太陽小便不利不可利之利之邪氣入里不能解咽乾淋衄小便不利當汗不可汗在表不可下下之動血誤犯之成結胸痞氣汗之成血蓄於胸中當汗而下之成協熱利太陽證誤下有八變脈浮者必結胸緊者必咽痛弦者必兩脅拘急細數者頭痛不止沉緊者必欲嘔沉滑者必熱利浮滑者必下血陽明不當發汗發汗成蓄血上焦為衄不當下而下之血蓄下焦發狂有年老患時熱狂妄服附者愈服寒涼者死足太陽未渴小便清者禁利咽乾禁汗成蓄血禁下太早已渴者五苓散譫語潮熱大渴宜下足少陽三禁胃實可下足太陰禁下足少陰脈沉口燥咽乾而渴禁汗脈澀而弱禁下三陰非胃實不可下治三焦便有膽少陽經作風治不宜汗下利小便治心便有腎少陰故本熱標寒故脈沉細按之洪大用承氣湯酒製熱飲是也治膀胱便有小腸太陽故本寒標陽故脈緊數按之不鼓而空虛用薑附寒飲頓服治肺便有脾太陰故寒因寒用大黃枳實下之治陽明純陽大腸喜熱惡清當以熱治寒也絡宜清當以寒治熱許學士解利外感傷風者惡風用防風二錢甘草麻黃各一錢頭痛加川芎項背腰痛加羌活身重加蒼朮肢節痛加羌活目痛鼻乾及痛加升麻或乾嘔或寒熱或脅下痛加柴胡傷寒者惡寒用麻黃二錢防風甘草各一錢頭沉悶加羌活一錢凡治傷寒以甘草為君防風白朮為佐是寒宜甘發也看他證加減傷風以防風為君甘草白朮為佐是風宜辛散也其傷寒表證以石膏滑石甘草知母蔥豉之類汗出即解如熱半表半裡與小柴胡汗出而愈熱甚大柴胡與之更甚小承氣裡熱甚大承氣發黃者茵陳蒿湯下之結胸陷胸湯下之內傷見於右手內傷躁作寒已寒作躁已不相併但有間且晡時必減乃胃氣得令潮作之時精神困倦乃其氣不足外傷見於左手外傷但無間且晡時必作劇乃邪氣盛潮作之時精神有餘乃邪氣勝寒邪不能食風邪能食表虛不作表虛治或勞役於涼處解衣或陰虛新浴表虛為風寒所遏切不可妄解表七大頭腫痛附蛤蟆瘟因陽明邪熱太甚故資實少陽相火而為之也濕熱為腫痛治之視其腫熱在何部分隨結而取之是天行也治黃芩炒甘草大黃煨黍黏子炒芒硝陽明渴加石膏少陽渴加栝蔞根陽明行經加升麻白芍葛根甘草太陽行經加羌活防風蛤蟆瘟因風熱治解毒丸下之側柏葉自然汁調蚯蚓糞敷燒灰大妙車前葉服或丁香尖附子尖南星醋磨敷皆可五葉藤汁敷亦可八霍亂脈微澀或代或伏脈弦滑者膈有宿食身卻不熱為霍亂大者生微遲者死脈洪者熱因其氣有三一曰火二曰風三曰濕邪在上焦則吐下焦則瀉中焦則吐而且利吐為暍熱也瀉為濕也風勝則動故轉筋也或因大渴而大飲或飢或飽甚傷損胃氣陰陽交爭而不和此為急病也不死如干霍亂而不得吐利必死證其狀心腹卒痛嘔吐下利憎寒發熱頭痛眩暈先心痛則先吐先腹痛則先下心腹俱痛吐利並作甚則轉筋入腹則死不然則吐瀉乾霍亂者忽然心腹脹滿絞刺痛欲吐不吐欲利不利須臾則死以鹽湯大吐之佳外有沖惡病同而名異治五苓散治熱多飲水關上脈洪者熱也宜清之理中丸治寒多不飲水身不熱者半夏湯治霍亂轉筋吐利不止身痛不止者宜加桂枝湯半夏曲茯苓陳皮白朮薄荷桂枝甘草和解散治霍亂此條內有所積外為邪氣所阻甚用吐法二陳湯和解散川芎蒼朮白芷防風九瘟病證衆人一般者是治有三法宜補宜散宜降大黃黃芩黃連人參桔梗蒼朮防風滑石粉人中黃香附子上神麯丸送下隨宜氣虛四君子血虛四物湯痰二陳湯熱甚童便作湯送下春夏不服麻黃秋冬不服桂枝夏不服青龍冬不服白虎十傷暑脈脈虛身熱或浮自汗自汗者火動而散故也因夏火太熱損傷肺金元氣其感有二動而得之乃辛苦之人動而火勝熱傷氣也脈洪而大靜而得之乃安樂之人靜而濕勝火勝金位也脈沉而實證治暑喜歸心入心則噎塞昏不知人入肝則眩暈入肺則喘滿痿躄入脾則昏睡不覺入腎則消渴病則怠惰嗜臥四肢不收精神不足兩腳痿弱頭疼惡熱躁熱大渴引飲大汗因動而中白虎加入參湯主方頭疼惡寒拘急肢節疼大熱無汗因靜而中大順散白虎加蒼朮有陰勝陽之極甚則傳腎肝為痿厥清暑益氣湯主之凡中暍死切忌與冷水涼處須沃以湯宜黃龍丸主之心虛傷暑身熱頭痛煩滿而渴五苓散主之肺虛傷暑身熱煩悶而喘白虎湯主之脾虛傷暑則為痎瘧常山飲主之黃連香薷湯治暑挾痰加半夏虛加參耆清暑益氣湯治暑傷金虛甚玉龍丸曾用治暑油炒半夏薑汁丸補中益氣湯治疰夏痰滲二苓湯治春夏之交病似傷寒自汗體重痛難轉側此名中濕澤瀉一兩滑石二兩茯苓豬苓白朮半兩暑風挾火痰實者可用吐法玉龍丸治暑泄瀉或二便祕焰硝明礬滑石硫黃一兩白麵六兩水丸水下十一瘧脈瘧脈自弦弦數多熱弦遲多寒弦小緊者可下之弦遲者可溫之弦數者可汗灸之浮大者可吐之弦數者風發也以飲食消息止之因夏暑舍於營衛之間腠理不密遇秋之風玄府受之慘愴之水寒氣氣閉而不出舍於腸胃之外與營衛並行晝行於陽夜行於陰並則病作離則病止並於陽則熱並於陰則寒淺則日作深則間日在氣則早在血則晏因汗郁成痰因虛弱陰陽相乘外因從六淫有寒濕疸濕牝寒則先寒後熱溫則先熱後寒疸則但熱不寒濕則身骨節疼牝則寒多不熱內因有臟氣不和鬱結痰飲所致有肝心脾肺腎之説説見後不內外因疫瘧一歲之內大小相似鬼瘧夢寐不詳疸瘧乍有乍已食瘧因飲食得之勞瘧因勞得之母瘧有母傳染者也李論夏傷於暑秋為痎瘧暑者季夏濕土濕令不行則土虧矣所勝妄行木氣太過少陽主也所生者受病則肺金不足不勝者侮之水勝土之分土者坤坤在申申為相火水入土則水火相干則陰陽交作肺金不足灑淅惡寒土虛少陽乘之則為寒熱發於秋者濕熱則卯酉之分也證治先寒而熱謂之寒瘧先熱而寒謂之溫瘧治之宜乎中也中者少陽也渴者燥勝也不渴者濕勝也又有得之於冬而發於暑邪舍於腎足少陰也有藏之於心內熱蓄於肺手太陰也但熱而不寒謂之疸瘧足陽明也在太陽經謂之風瘧宜汗之在陽明經謂之熱瘧宜下之少陽經謂之風熱宜和之此傷之淺也在陰經則不分三經謂之溫瘧宜從太陰經論之此傷之重也太陽經頭痛腰痛寒從背起先寒後熱宜小柴胡羌活地黃湯少陽經心體解㑊寒熱不甚惡見人多汗出甚小柴胡湯陽明經先寒久乃熱熱大汗喜見火乃快宜桂枝二白虎一湯少陰經嘔吐煩悶熱多寒少欲閉戶而處病難已小柴胡加半夏湯太陰經好太息不嗜食多寒熱汗出病至喜嘔乃衰理中湯厥陰經小腹腰痛小便不利意恐懼四物玄明苦楝附子湯心瘧煩心甚欲得清水反寒多不甚熱宜桂枝黃芩湯肺瘧心寒甚熱間善驚如有見者桂枝加芍藥湯肝瘧色蒼蒼然太息甚伏若死通脈四逆湯脾瘧寒則腹痛熱則腸鳴鳴已汗出小建中湯芍藥甘草湯腎瘧腰脊痛宛轉便難目眴然手足寒桂枝加當歸芍藥湯胃瘧將病也善飢不能食能食而支滿腹脹理中湯丸主之勞瘧經年不瘥後復發作微勞力不任名曰勞瘧母瘧百藥不瘥結成癥癖在腹脅名瘧母治雖不同瘧得於暑當以汗解或汗不徹鬱而成痰宜以養胃化痰發汗邪氣得出自然和也虛則補之脈洪數無力者是也羌活湯治邪氣淺在表羌活防風甘草惡寒有汗加桂枝惡風無汗加麻黃吐加半夏麻黃桂枝湯治夜瘧此散血中風寒麻黃一兩桂枝二錢甘草炙三錢黃芩五錢桃仁三十粒去皮尖邪氣深而入血故夜以桃仁緩肝散血中邪桂枝石膏湯治邪深間日桂枝石膏知母黃芩汗出不愈為內實外虛寒熱大作必傳入陰太陽陽明耆芍寒熱傳入太陽陽明少陽合病加柴胡半夏人參甘草藜蘆散治久瘧欲吐不能吐宜吐之藜蘆為末溫齏水調下半錢以吐為度張法白虎加參湯小柴胡合五苓散神祜丸治之服前三方未動次與之承氣湯治甚者甘露飲調之人參柴胡飲子補之常山飲吐之老瘧丹治老瘧風暑入陰在臟凝血氣川芎桃仁紅花當歸蒼朮白朮白芷黃柏甘草上水煎露一宿次早服之瘧母丸治瘧母食瘧鱉甲醋炙君三稜莪朮醋炙香附子阿魏食積加醋化截瘧丸先補藥表藥徹起陽分方可截川常山草果知母檳榔烏梅穿山甲炒甘草炙用水一大碗煎半碗露一宿臨發時溫服之宜吐一補一發丹治久瘧內傷挾外邪內發必主痰外以汗解半夏茯苓陳皮柴胡黃芩蒼朮川常山葛根虛加參術補氣甚加芩連有一人夏感脈沉細服之愈常山湯治婦胎瘧常山二兩黃芩三兩石膏八錢另研烏梅十四個甘草一兩煎服之不二散白麵二兩砒一錢和勻以香油一斤煎之色黃用草紙壓之去油為末入江茶三兩每服一字神妙絶瘧木通川者秦艽去蘆穿山甲炙常山各等分辰砂半錢另研烏梅七個大棗七個上以水三盞煎至半入酒一盞再至半先刮砂棗服次服藥十二疸脈證脈沉渴欲飲水小便不利皆發黃脈沉乃陽明蓄熱喜自汗汗出入水熱鬱身腫發熱不渴名黃汗脈緊數乃失飢發熱大食傷胃食則腹滿名谷疸數為熱熱則大食緊為寒寒則腹滿脈浮緊乃因暴熱浴冷水熱伏胸中身面目悉如金色名黃疸陽明病脈遲者食難用飽飽則發煩頭眩者必小便難欲作谷疸脈沉弦或緊細因飲酒百脈熱當風入水懊憹心煩足熱名酒疸其脈浮欲嘔者先吐之沉弦者先下之脈浮緊乃大熱交接入水腎氣虛流入於脾額黑日晡熱小腹急足下熱大便黑時溏名女勞疸腹如水狀不治脈寸口近掌無脈口鼻冷不治其病身熱一身盡痛發黃便澀因內熱入水濕熱內郁沖發胃氣病雖有五皆濕熱也治諸黃家但利其小便愈假令脈浮以汗解之如便通汗自當下之愈當以十八日為期治之十日以上為差反劇者難治治法以疏濕利小便清熱或汗之五苓加茵陳連類茵陳梔子湯茵陳一兩去莖大黃半兩山梔十個豆豉湯下五苓散熱加苦參渴加栝蔞根便澀加葶藶素熱加黃連茵陳蒿湯治黃疸寒熱不食食則頭眩心胸不安者是滑石石膏丸治女勞疸證見題下滑石石膏研末下粥飲例利則止十三勞勞極煩熱勞瘵脈男子平人脈大為勞極虛為勞浮大為裡虛男子脈虛弱細微者善盜汗男子脈虛沉弦無寒熱短氣裡急小便不利面色白時目瞑喜衄諸芤動微緊男子失精女子夢交脈沉小遲名脫氣其人疾行則喘手足寒腹滿甚則溏泄食不消脈弦而大大則為芤弦則為減女子漏下男子失精脈微弱而澀為無子精氣清冷尺脈弱寸強胃絡脈傷安臥脈盛謂之脫血脈舉之而滑按之而微看在何部以知其臟尺弱滑而澀下虛也尺滑而澀疾為血虛脈數骨肉相失聲散嘔血陽事不禁晝涼夜熱者死脈輕手則滑重按則平看在何經而辨其腑寸弱而微者上虛也因喜怒不節起居不時有所勞傷皆傷其氣氣衰則火旺火旺則乘其脾土而胃氣元氣散解不能滋養百脈灌注臟腑衛護周身百病皆作證百節煩疼胸滿氣短心煩不安耳聵鳴眼黑眩寒熱交作自汗飧泄四肢怠惰者外有脾痹中風濕痹病傷暑骨熱不同治法以甘寒瀉火甘溫補中溫之收之十全散四物湯治血虛四君子湯治氣虛加升麻補中益氣湯牛膝丸治腎肝損骨痿不能起床筋緩不能收持川萆薢炒杜仲炒蓯蓉酒浸菟絲酒浸牛膝酒浸治腎蒺藜治肝各等分桂枝半兩酒煮豬腰子丸梧桐子大空心酒下亦治腰痛腎氣丸治腎脾不足房室虛損宜此榮養血以益腎腎苦燥以辛潤之致津液故用川芎酸以收之故用五味蓋神方也蒼朮泔浸一斤熟地一斤五味半斤川芎冬一兩夏半兩秋七錢春亦七錢上為末用棗肉丸米飲下地黃煎丸解勞生肌活血生地汁藕汁杏仁汁薑汁各五升薄荷汁鵝梨汁法酒二升沙蜜四兩以上慢火熬成膏入後藥柴胡三兩去蘆秦艽去蘆桔梗各二兩熟地黃四兩木香枳殼炒柏子仁炒山藥白茯苓遠志去心人參白朮各一兩麝香半錢另研上為末和前藥丸如梧桐子大甘草湯下辛苦勞柴胡人參黃耆黃柏甘草牡蠣散治諸虛不足津液不固自汗出牡蠣煅取粉麻黃根黃耆或加秦艽柴胡小麥同煎麥門冬湯治大病後虛煩則熱不解不得臥半夏竹茹陳皮茯苓麥門冬人參炙甘草湯治虛勞不足汗出而悶心悸脈結代酸棗仁丸治虛勞虛煩不得眠者棗仁炒一兩參桂各一錢茯苓三錢石膏半兩豬苓三錢固精丸治精滑牡蠣砂鍋煅醋淬七次醋糊丸梧子大空心鹽酒送下參歸散治骨蒸勞知母炒人參炒秦艽去尖蘆北柴胡同術炒鱉甲麥湯浸七次前胡各半兩烏梅三個地骨皮川常山酒浸三日川歸柴胡同炒甘草白茯苓各七錢半水煎服脾虛本經宜四君子湯肝乘之脅痛口苦往來寒熱而嘔四肢滿悶淋溲便難轉筋腹痛宜防風獨活川芎桂芍藥白朮茯苓豬苓澤瀉黃柏細辛滑石心乘之宜連芩柏白芍地黃石膏知母肺受病痰嗽短氣懶言嗜臥灑淅寒熱宜補中益氣湯作涎清涕肩胛腰脊痛冷泄宜乾薑朮附烏蒼朮桂茯勞極勞者神不寧也肝勞實熱關格牢澀閉寒不通毛悴色夭肝勞虛寒口苦關節疼痛筋攣縮煩悶心勞實熱口舌生瘡大便閉塞心滿痛小腹熱心勞虛寒驚悸恍惚多忘夢寐驚魘神志不定脾勞實熱四肢不和五臟乘戾脹滿肩息氣急不安脾勞虛寒氣脹咽滿食不下通噫宿食臭肺勞實熱氣喘鼻脹面目苦腫肺勞虛寒心腹冷氣氣逆遊氣胸脅氣滿從脅達背痛嘔逆虛乏腎勞實熱小腹脹滿小便赤黃末有餘瀝數少莖中痛陰囊生瘡腎勞虛寒恐慮失志傷精噓吸短氣遺泄白濁小便赤黃陰下濕癢腰脊如折顏色枯悴盡力謀慮則肝勞曲運神機則心勞意外致思則脾勞預事而憂則肺勞矜持志節則腎勞極者窮極無所養也筋實咳而兩脅下痛不可轉動腳下滿不得遠行腳心痛不可忍手足爪甲青黑四肢筋急煩滿筋虛好悲思支噓吸腳手俱攣伸動縮急腹內轉痛十指甲疼轉筋甚則舌卷卵縮唇青面色蒼白不得飲食脈實氣衰血焦發落好怒唇舌赭甚則言語不快色不澤飲食不為肌膚脈虛虛則咳咳則心痛喉中介介如梗甚則咽垂肉實肌脾淫淫如鼠走津液開腠理脫汗大泄或不仁四肢急痛或腹緩弱唇口壞皮膚變色肉虛體重怠惰四肢不欲舉關節痛疼不嗜飲食飲食則咳咳則脅下痛陰引背及肩不可轉動氣實喘息沖胸常欲自恚心腹滿痛內外有熱煩嘔不安甚則嘔血氣短乏不欲食口燥咽乾氣虛皮毛焦津液不通力乏腹脹甚則喘息氣短息塞晝差夜甚精實目視不明齒焦發落形衰通身虛熱甚則胸中痹悁痛煩悶泄精精虛尪羸驚悸夢泄遺瀝小便白濁甚則莖弱核徹小腹裡急骨實熱耳鳴面色焦枯隱曲膀胱不通牙腦苦痛手足痠疼大小便閉骨虛面腫垢黑脊痛不能久立氣衰發落齒稿腰背相引痛甚則喜唾不了煩熱內熱曰煩外熱曰熱身不覺熱頭目昏痛口乾咽燥不渴清清不寐皆虛煩也平人自汗小便頻並遺泄白濁皆憂煩過度大病虛後煩悶謂之心虛煩悶古今録驗五蒸湯治五蒸病甘草一兩炙人參知母黃芩各二兩茯苓熟地葛根各三兩竹葉二把石膏五兩碎梗米二合上㕮咀以水九升煮取二升半分為三服亦可以煎小麥水乃煎藥忌海藻菘菜蕪荑大醋實熱黃芩黃柏黃連氣也大黃血也虛熱烏梅秦艽柴胡氣也青蒿蛤蚧鱉甲小麥丹皮血也肺鼻乾烏梅天冬麥冬紫菀皮舌白唾血桑白皮石膏膚昏昧嗜唾牡丹皮氣遍身虛熱喘促鼻乾人參黃芩梔子大腸鼻右孔干痛大黃芒硝脈唾白浪語脈絡溢脈緩急不調生地黃當歸心舌乾生地黃連血發焦地黃當歸桂心童便小腸下唇焦赤茯苓木通生地脾唇焦芍藥木瓜苦參肉食無味而嘔煩躁甚不安白芍藥胃舌下痛石膏粳米大黃芒硝葛根肝眼黑川芎當歸前胡筋甲焦川芎當歸膽眼白失色柴胡栝蔞三焦乍寒乍熱石膏竹葉腎兩耳焦生地石膏知母寒水石腦頭眩悶熱地黃防風羌活髓髓沸骨中骨熱天冬當歸地黃骨齒黑腰痛足逆鱉甲地骨皮牡丹皮歸生地黃肉肢細膚腫腑臟俱熱石膏黃柏胞小便赤黃澤瀉茯苓滑石生地沉香膀胱左耳焦苓滑石澤瀉外有胸中煩熱肝中寒煩悶肝中風酒疸中暑中風濕心痹脾痹肝虛寒精實五心煩熱小腸熱心虛熱足下熱酒疸女勞疸日晡熱如疸勞瘵脈虛因痰與血病證其病俗名傳尸雖多種不同其病與前人相似大略令人寒熱盜汗夢與鬼交遺泄白濁發乾而聳或腹中有塊或腦後兩邊有小核數個或聚或散沉沉默默咳嗽痰涎或咯膿血如肺痿肺癰狀或腹下利羸瘦困乏不自勝持雖不同證其根多有蟲齧心肺一也治青蒿一斗半童便三斗文武火熬至七分去蒿再熬至一升入豬膽汁七個辰砂檳榔末再熬數沸以甘草末收之四物湯治虛勞痰竹瀝薑汁便或加參術三拗湯治傳尸勞瘵寒熱交攻久嗽咯血羸瘦先服此方後服蓮心散萬無一失麻黃生甘草杏仁不去皮尖炙薑棗煎服痰清則止蓮心散當歸黃耆甘草炙鱉甲醋炙前胡柴胡獨活羌活防風防己茯苓半夏黃芩陳皮官桂阿膠赤芍麻黃去節杏仁蓮心去心天南星川芎芫花醋炒黑枳殼炒除芫花每服二錢半水二盞半薑三片棗一枚入芫花一抄煎至八分服須吐有異物漸減芫花及甘草殺蟲少之調鼎方治傳尸勞神效混沌皮一具醋浸一宿焙乾炙鱉甲桔梗芍藥胡黃連製大黃甘草豉心苦參貝母秋石另研草龍膽知母黃柏蜜炙芒硝犀角一錢蓬朮一個上煉蜜為丸溫酒下二十丸腸熱食前膈熱食後一月平安白蠟丸治瘵

body:
  text: 卷二十四熱脈浮大而虛為虛脈細而實為實脈沉細或數者皆死病熱有火者心脈洪是也無火者死細沉是也脈弱四肢厥不欲見人食不入利下不止死因因心火為之心者君火也火旺則金爍水虧惟火獨存證治暴熱病在心肺積熱病在腎肝虛熱如不能食而熱自汗氣短屬脾虛治宜甘寒溫而行之實熱如能食口乾舌燥便難者屬胃實治宜辛苦大寒下之火熱而鬱乃心火下陷脾土抑而不伸五心熱宜汗之發之心神煩亂血中伏火病蒸蒸然不安宜鎮陰火硃砂安神丸主之蒸勞熱乃五臟齊損病久憔悴盜汗下血宜養血益陰陰虛而熱者用四物加柏治法小熱之氣涼以和之大熱之氣寒以取之甚熱之氣汗而發之不盡則逆治之又治法養血益陰其熱自治經曰壯水之主以制陽光輕者可降重者從其性而伸之李論外有元氣虛而熱有五臟而熱有內中外而熱輕手捫之則熱重之則不熱在皮毛血脈也輕按之不熱重至筋骨熱蒸手足甚筋骨熱也不輕不重而熱在肌肉也凡三法以三黃丸通治之肺熱者輕按之瞥瞥見於皮毛日西甚其證喘咳灑淅寒熱輕者瀉白散重者涼膈白虎地骨皮散心熱者微按之熱見於血脈日中甚其證煩心心痛掌中熱而啘以黃連瀉心湯導赤散硃砂安神丸肝熱肉下骨上熱寅卯間甚脈弦四肢滿悶便難轉筋多怒驚四肢困熱筋痿不起床瀉青丸柴胡飲脾熱輕重之中見於肌肉夜甚怠惰嗜臥無氣以動瀉黃散調胃承氣治實熱補中益氣湯治虛熱腎熱按至骨蒸手如火困熱不任起床宜滋腎丸六味地黃丸平旦潮熱熱在行陽之分肺氣主之白虎加芩日晡潮熱熱在行陰之分腎氣主之地骨皮牡丹皮知母柏木香金鈴子散治暴熱心肺上喘不已大黃五錢金鈴子三錢木香三錢輕粉朴硝上為末柳白皮湯下三錢以利為度止喘亦止大黃散治上焦煩不得臥睡大黃梔子鬱金各五錢甘草二錢半煎服微利則止黃牛散治相火之氣遊走臟腑大便閉大黃一兩牽牛頭末半兩酒下三錢以利為度此不時熱溫熱也金花丸柏連芩梔大黃便實則加煎丸任用或腹滿吐嘔欲作利加半夏苓朴生薑如白膿下利後重加大黃涼膈散退六經熱連翹山梔大黃薄荷甘草一兩半黃芩半兩朴硝二錢半如咽噫不利腫痛並涎嗽加桔梗一兩荊芥半兩咳而嘔加半夏三錢姜煎鼻衄嘔血加白芍地黃如淋閉加滑石四兩茯苓一兩或悶而不通腹下狀如覆碗痛悶難忍乃腸胃乾涸膻中氣不下先用木香三錢沉香三錢酒下或八正散甚則宜上湧當歸承氣湯治陽狂奔走罵詈不避親疏此陽有餘陰不足也當歸大黃芒硝各一兩甘草半兩每二兩薑棗煎牛黃膏治熱入血室發狂不認人牛黃二錢半硃砂一兩鬱金甘草各半兩腦子一錢丹皮三錢上煉蜜丸皂子大水下三黃丸治實熱能食者能食為實熱也白虎湯治表熱惡寒而渴者柴胡飲子治兩脅下肌熱脈浮弦者四順飲子治一身盡熱日晡肌熱皆血熱也桃仁承氣治血熱夜發熱者潮熱者黃芩生甘草辰戍時加羌活午間黃連未時石膏申時柴胡酉時升麻夜間當歸根如有寒者黃耆參術兩手大熱為骨厥如在火中可灸湧泉五壯立愈地黃丸治久新憔悴寢汗發熱腸澼下血骨蒸痿弱無力五臟齊損不能運動煩渴皮膚索澤食後更宜當歸飲子熟地八兩山茱萸山藥各四兩丹皮茯苓澤瀉各三兩上煉蜜和丸梧子大每服五十丸空心酒下當歸飲子柴胡人參黃芩甘草各一兩大黃當歸白芍各三兩滑石三兩姜煎服如痰實咳嗽加半夏五穀不化完出淋悶驚悸上下血宜金花丸硃砂安神丸治心神煩亂怔忡兀兀欲吐胸中氣亂而熱似懊憹狀皆是膈上血中伏火硃砂一錢研黃連一錢半酒製炙甘草五分生地五錢當歸半錢餅丸津下如心痞食入反出加煨大黃除地黃補血湯治肌熱燥熱目赤面黃紅煩渴引飲日夜不息脈浮大而虛重按之全無為血虛發熱證似白虎唯脈不長並實耳黃耆一兩當歸二錢酒製熱服火劑湯黃芩黃連山梔黃柏火鬱湯治四肢熱五心煩熱因熱伏土中或血虛得之或胃虛多飧冷物抑遏陽氣於土中羌活升麻葛根人參白芍各半兩柴胡甘草炙各三錢防風二錢半蔥白三寸煎服硃砂涼膈丸治上焦虛熱肺脘咽膈有氣如煙搶上黃連山梔各一兩人參半兩硃砂三錢另研腦子另研五錢茯苓五錢上蜜丸硃砂為衣水下黃連清膈丸治心肺間及經中熱麥冬一兩黃連五錢鼠尾三錢上蜜丸緑豆大溫水下補中益氣湯治脾胃虛弱而熱辰砂滑石丸治表裡熱辰砂龍腦薄荷六一散祕方治陰虛發熱四物湯黃柏龜板人參白朮二味氣虛加之治酒發熱青黛栝蔞仁生薑十五吐衄下血脈脈澀濡弱為亡血細弦而澀按之虛為脫血也脈浮弱按之而絶者為下血煩咳者必吐血脈沉弦面無血色無寒熱者必衄沉為在裡營衛內結胸滿必吐血脈滑小弱者生浮大牢數者死又血溫身熱脈躁者死熱為血氣散故也藏血脈俱弦者死滑大者生因外有肺癰肺痿亦能咳嗽膿血勞亦能吐血證治麻黃湯治傷寒證大壅塞內熱火氣不伸成衄脈浮緊為寒桂枝湯治證同前脈浮緩為風五苓散治伏暑熱流入經絡黃芩芍藥湯治傷寒風二證脈微衄血方治出於肺經如不止用寒水紙於胸腦大椎三處貼之犀角升麻山梔黃芩白芍生地丹參紫參阿膠荊芥穗研服亦良蘿蔔頭段搗飲又汁滴之亦良大椎啞門灸之亦止咯唾血方出於腎亦有瘀血內積肺氣壅遏不能下降肺壅非吐不可天冬麥冬知母貝母桔梗熟地遠志黃柏有寒加乾薑肉桂嘔痰涎血方出於脾黃耆黃連白芍當歸甘草沉香葛根嘔吐血方出於胃犀角地黃湯治實及病餘瘀血犀角一兩生地八兩白芍三兩丹皮二兩小建中湯加黃連治虛及傷胃吐血三黃補血湯治六脈大按之虛面赤善驚上熱乃手少陰心之脈也此氣盛而亡血瀉火補氣以墜氣浮丹皮一錢川芎二錢熟地二錢生地三錢柴胡當歸各一錢半升麻黃耆各一錢白芍五錢人參飲子治脾胃虛弱衄血吐血又治吐血久不愈於氣衝三稜針出血立愈甘草一錢麥冬二錢當歸三錢黃耆一錢五味子五個白芍一錢救肺飲治咳吐血升麻柴胡白朮白芍各一錢歸尾熟地黃耆人參各二錢蘇木陳皮甘草各五分作一服清心蓮子飲治咳血兼痰涼血地黃湯治腸澼下血水穀與血另作一派知母炒黃柏炒各一兩槐子炒青皮熟地當歸如餘證同痢門法治之胃氣湯治風毒客腸胃動則血下芍術參歸桂芎苓各等分尿血方治心腎因房勞憂思氣結發灰能消瘀血通閉醋湯下三錢棕櫚燒灰米飲下亦可三汁丹治小便出血水楊樹腦老鴉飯草赤腳馬蘭各自然汁以水服之益陰散治陽浮陰翳咯血衄血黃柏黃連黃芩以蜜水浸炙乾白芍人參白朮乾薑各三錢甘草炙六錢雨前茶一兩二錢香油釜炒紅米飲下三四錢立安三黃丸治衄血不止大便結燥者下之大黃半兩芒硝地黃二錢黃連黃芩山梔各一錢老蜜煉丸咳血丹治因身熱痰盛血虛青黛栝蔞仁二味治痰訶子海石澀杏仁治嗽甚四物湯治虛薑汁童便山梔蜜調噙化嘔血丹治因火載血上錯經四物湯山梔炒鬱金童便薑汁韭汁山茶花痰加竹瀝喉中痛是氣虛加參耆朮柏衄血丹涼血犀角地黃湯入鬱金溺血丹治熱生地四兩蘇木根淡竹葉山梔炒滑石甘草蒲黃藕節當歸血虛加四物牛膝膏通草下血丹四物湯熱加連酒煮溫山梔炒秦艽升麻膠珠白芷虛加乾薑炮五倍子寒加辛升溫散一行一止神效方治吐血痰血酒色過度者枇杷葉去毛款冬紫菀茸杏仁去皮尖鹿茸炙如法桑白皮木通各一兩大黃半兩煉蜜丸臨臥含化口中聖餅子治咯血青黛一錢杏仁四十粒去皮尖上杏仁以黃蠟煎黃色研細入黛作捏餅子每日柿一個中破開入藥合定濕紙煨飲下羅面丹治內損吐血飛羅面略炒京墨磨下二錢越桃散治下血及血痢山梔槐花大棗乾薑各等分燒存性研米飲下三錢伏龍肝散治便血因內外有感凝住在胃隨氣下通亦妄行之類伏龍肝八兩白朮阿膠黃芩乾地黃甘草各三兩煎服赤豆歸散治先血後便謂之近血赤小豆五兩浸令芽出曬乾當歸一兩為末漿水下五靈脂散治下血五靈脂炒為末芎歸湯下有血脫盡色白而夭不澤脈濡此大寒證乃始同而末異治宜辛溫益血甘熱溫經乾薑類是也有陰結者便血夫邪在五臟則陰脈不和陰不和則血留之血無所稟滲入腸間其脈虛澀非腸風臟毒也治宜生地黃汁小薊汁各一升砂糖地榆阿膠側柏葉十六下利脈脈滑按之虛絶者必下利寸脈反浮數尺中自澀必下清膿血脈沉弦者下重其脈小大者為未止脈數若微發熱汗自出者自愈設脈復緊者必為未解脈微若數者令自止雖發熱不死脈反弦發熱身汗出自愈脈絶手足厥灸之手足溫者生若脈不還反微喘者死脈遲而滑者實也利未止當下之數而滑者有宿食當下之腸澼下白沫沉則生浮則死腸澼下膿血懸絶者死滑大生又沉小流連者生數大有熱者死腸澼轉筋脈極數者死凡諸痢泄注脈沉小者生浮大者死身熱者死或譫語或腹堅痛脈沉緊者可下遲者可溫之下痢不欲食有宿食腸滿痛為寒食腸堅心下堅為實皆可下下痢脈遲緊痛腸鳴心急大孔痛皆可溫傷寒下痢三部無脈尺中時小見脈再舉頭者腎氣也形損脈不至者死因風濕熱論之則火盛而金去獨木火旺而脾土損矣輕則飧泄身熱脈洪谷不能化重則下利膿血經曰春傷於風夏必飧泄又曰諸下利皆屬於濕又曰下利稠黏皆屬於火又曰利下膿血皆屬滯下證前證皆熱證實證也忌用龍骨石脂粟殼等劑虛證泄利水穀或化或不化並無努責惟覺困倦脈弦澀者是也宜溫補之治治法重則大黃湯主之輕則黃芩芍藥湯主之後重則宜下乃有物結墜裡熱脈洪甚宜下若脈洪大甚不宜下也又大腸經氣不宣加木通檳榔木香腸痛則宜和胃氣不和當以茯苓歸芍和之身重則除濕脈弦則去風風氣因動屬於內大柴胡湯主之血膿稠黏以重藥竭之熱甚故也身冷自汗以毒藥溫之有暴下無聲身冷自汗小便清利大便不禁氣難布息脈沉微喘吐雖有裡急後重謂寒邪在內而氣散也可溫藥而安則漿水散是也屬少陰風邪在內縮宜汗之也有厥陰下利不止脈沉而遲手足厥逆涕唾膿血此難治宜麻黃湯小續命湯平之法曰謂有表邪縮於內當散表邪而安矣李用升舉之法亦然鶩溏為利宜溫之謂利有結糞屬太陰有里者下之或後重或食積與氣墜下之在上者湧之或痰氣在上湧之安在下者竭之大法去者送之盛者和之過者止之假如惡寒熱腹不痛加苓為主痛甚加當歸倍芍如見血加連或發熱惡寒非芩不止上部血也如惡寒脈沉腰痛或白痢下痛或血非連不止中部血也或惡寒脈沉先血後便非地榆不止下部血也痢下有風濕熱寒虛滯下噤口痢疳痢瘵痢濕蝕瘡病同而因異血痢有瘀血血枯肺痿風血酒痢證同而因異泄痢是積辨泄痢有期或久亦然或久神不悴亦然宜逐去之此名滯下有一人年六十憂患滯下褐色腹微痛後重頻並食大減身微熱脈弦而澀似數稍長非滯下乃憂患所致心血虧脾弱也以四物四君合而治之愈有一人年三十奉養厚秋間患滯下腹大痛左脈弦大似數右脈亦然稍減重取似緊此乃醉飽後吃寒涼當做虛寒治之遂以四物桃仁紅花去地黃加參朮乾薑煎入薑汁茯苓一月而安黃芩芍藥湯治泄痢腹痛後重身熱脈洪疾芍藥黃芩各一兩甘草五錢痛加桂少許大黃湯治前證重者大黃一兩酒浸半日煎服以利為度芍藥湯治下痢膿血裡急後重行血則便膿自安調氣則後重自除芍藥一兩當歸黃連各半兩甘草炒木香檳榔桂枝各二錢黃芩半兩大黃三錢白朮芍藥湯治脾受濕水泄微滿困弱暴下無數白朮芍藥各一兩甘草腹痛甚加芩桂脈弦頭痛加蒼朮防風下血加蒼朮地榆癢則同上如心下痞滿加枳實黃連湯治大便下血腹中不痛謂之濕毒下血腹中痛謂之熱毒下血當歸半兩大黃二錢半熱毒加之芍藥桂腹痛加之訶子散治虛滑久不已黃連三錢木香半兩炙甘草三錢訶子皮生熟各半兩白朮芍藥湯送下桃花湯治冷痢腹痛下魚腦白物赤石脂煅乾薑炮餅丸飲下漿水散治暴泄如水身冷脈微氣少甚者加吐急痛半夏一兩炮附子乾薑五錢桂枝五錢炙甘草三錢良薑二錢半上為末三五錢漿水二盞煎半和滓熱服小續命湯治風積痢龍芽草劉寄奴椿皮丸治風邪內陷香連丸止痢燥濕和血湯治腸澼下血合作一派腹中大痛此乃陽明氣衝熱毒所作也以下出李地黃生熟各半兩牡丹皮半錢白芍一錢半當歸二錢甘草生半錢熟一錢黃耆一錢升麻七錢蒼朮秦艽肉桂各三錢橘皮二錢作一服升麻補胃湯治前證腹中不痛腰沉沉然乃陽明少陽經血證名濕毒下血效過老人久痢升麻一錢羌活二錢獨活柴胡防風各五分葛根三錢肉桂少許白芍一錢半當歸三錢丹皮半錢地黃生熟各半錢炙甘草半錢黃耆一錢槐花治濕毒青皮作兩服益智和中湯治前證腹中痛皮惡寒脈俱弦按之無力關甚緊弦肌表陽分涼喜熱尉為內寒明矣升麻一錢半葛根半錢白芍一錢半炙甘草一錢桂皮四錢益智五分當歸一錢黃耆一錢牡丹皮炙柴胡半夏各五分乾薑炒肉桂一錢茯苓湯治傷飲冷水變成白痢腹內痛減食茯苓六錢澤瀉一錢當歸四錢蒼朮二錢生薑二錢黃芩三錢肉桂二錢豬苓六錢甘草半兩炙芍一錢半升麻柴胡各二錢止痢神丸川黃連茱萸粟殼清泔浸三日又酒浸七日炒乾同上二味同此制上末為丸熱則甘草湯下寒薑湯下八十丸小柴胡去參湯渾身熱挾外感沒乳丸治瘀血痢乳香沒藥桃仁滑石佐以木香檳榔蘇木湯下保和丸治食積痢噤口丹治噤口痢嘔不納食亦治痢吐食枇杷葉十張蜜炙縮砂十個末熟蜜調抹口上半夏四錢人參八錢姜煮乾焙末以姜粉入香附丸服連多加參煎呷大承氣湯治下痢不欲食許學士云凡痢病腹痛以白芍甘草為君歸術為佐見血前後以三焦熱論凡治痢病小便清白不澀為寒赤澀為熱又法完穀不化而色不變吐利腥穢沉沏清冷小便清白不澀身涼不渴脈微細而遲者寒也穀雖不化而色變非白煩渴小便赤黃而或澀者熱也凡穀消化無問他證及色便為熱也寒泄而谷化者未之有也傷食微加大黃腹脹川朴渴者白茯苓腹痛白芍甘草為主冬月白芍藥一半白朮一半夏月制黃芩先見膿血後見大便者黃柏為君地榆為佐加歸尾先見大便而膿血者制芩歸梢膿血相雜下者制連大便腹不痛白芍半之身倦目不欲開口不能言黃耆人參沉重者製蒼朮不思食者木香藿香余同上十七泄脈脈疾身多動音聲響亮暴注下迫此陽也熱也脈沉細疾目睛不了了飲食不下鼻準氣息此陰也寒也因濕多成五泄者胃泄脾泄大腸泄小腸泄大瘕泄證治胃泄飲食不化色黃宜承氣湯脾泄腹脹滿泄注食嘔吐逆宜理中湯一云腸鳴食不化者經云脾虛大腸泄食已窘迫大便色白腸鳴切痛宜乾薑附子湯小腸泄溲便膿血小腹痛宜承氣湯大瘕泄裡急後重數圊不得莖中痛宜五苓散五病治雖不同其濕一也有化寒化熱之異故也虛則無力不及拈衣而已出故謂之不禁故也溫之熱之實則圊不便虛坐努責宜下之痰積下流因太陰分有積痰肺氣不得下流降而瘀大腸虛而作泄當治上焦以蘿蔔子等吐之水恣泄乃大引飲是熱在膈上水多入下胃經無熱不勝寒泄大腸滿而泄鶩溏風泄久風為飧泄乃水穀不化而出也防風為君平胃五苓散治濕泄水恣泄熱泄此方治一切陽證平胃散五苓散白朮熱加黃連木通補胃丸治氣虛下溜四君子白芍炒升麻流積丸治痰積下流甚則吐之青黛黃芩海石神麯砂仁止瀉丸肉豆蔻五兩滑石春一兩夏二兩秋一兩半寒加神麯砂仁吳茱萸熱加黃連茯苓滑加訶子煨溫六丸清六丸脾泄丸白朮二兩炒白芍一兩酒炒神麯一兩半炒查子半夏一兩半黃芩半兩炒蒼朮虛加參朮甘草裡急後重加檳榔木香荷葉煨飯丸姜附湯治寒泄椒術丸治濕瀉川椒蒼朮肉果胃風湯治風泄太平丸治泄黃連一方與乾薑炮各一兩或加訶歸名駐車丸一方與茱萸各一兩或加芍藥又名苦散腸鳴乃濕與熱相搏也或大熱亦然或飲水亦鳴許論泄瀉有八冷瀉脈微宜暖藥熱瀉胃中有熱傷寒多有脈數宜涼解之積瀉脾脈沉弦宜逐積脾瀉同上條氣泄者躁怒不常傷動其氣肝氣乘脾而泄脈弦而逆宜調氣飧泄者春傷於風肝旺受病而傳於脾至季夏土而泄宜瀉肝補土驚瀉者因心受驚驚則氣亂心氣不通水入穀道而泄心脈散大者是宜調心利水病亟氣敗而瀉者素問云門戶不要也厥逆幽悶困瀉不止四肢冷困軟不能轉側下泄不知脈亡陽喘者死十八自汗頭汗因濕能自汗熱能自汗虛則盜汗痰亦自汗頭汗證陰陽俱虛身體枯燥頭汗亡津液也熱入血室頭汗傷濕額上汗因下之微喘者死胃熱上熏頭汗發黃頭汗小便不利而渴此瘀熱在裡也心下懊憹頭汗十九淋附小便不禁腎臟風脈細而數脈盛大而實者生虛小而澀者死尺中盛大此陰血不足陽乘之為關因膀胱有熱則淋然赤澀淋澀如脂膏如砂石皆內熱也如水煎鹽而成也氣不利則不通經曰小便為氣所化氣不化則臍腹滿不利悶而為淋治法淋者解熱利小便閉者行氣則水自下有氣虛則氣不行血虛則氣不升痰多氣塞則氣不運治法氣虛補氣血虛補血痰多導痰先服本藥後皆用吐之以提其氣氣升則水自下加以五苓散有人患淋乃血滯故四物湯內加杜牛膝而愈死血亦淋也李論皆邪在肺而無資其化源邪熱在腎而閉其下焦可除其熱瀉其塞當已治熱在上焦以梔子黃芩主之熱在中焦加以連芍熱在下焦加之以柏資腎丸治小便閉不渴熱在下焦血分也知母酒製黃柏各二兩酒炒肉桂一錢清肺飲子治渴小便不利熱在上焦氣分茯苓二錢豬苓三錢澤瀉五錢琥珀五分燈心一錢木通七錢通草二錢車前子一錢扁豆七錢瞿麥半錢導氣除濕湯治小便閉乃血澀致氣不通或淋者即有死血知母三錢酒浸黃柏四錢酒製滑石二錢炒黃澤瀉茯苓各三錢空心服牛漆膏治前方證大妙腎疸湯治目黃漸至身小便赤澀升麻半兩羌活防風藁本獨活柴胡各半錢白朮蒼朮一錢豬苓四錢茯苓二錢黃柏二錢澤瀉三錢白芍五分神麯六錢炒人參三錢甘草三錢作二服祕方淋熱則利之山梔之類氣虛補之參術加木通山梔之類小便不通氣虛參朮升麻湯後吐之血虛四物湯後吐之痰氣閉塞二陳湯加木通香附後吐之又方治淋麥門冬蔥頭帶根人參三臼根黑豆濃煎飲之淋方五淋散牛膝根葵子滑石瞿麥冷加附熱加芩血加梔子膏加秋石加石葦氣小腹滿閉加沉香木香發灰散治飲食忍小便走馬房勞皆致轉胞臍下急滿不通醋服一合或加葵子甘遂加大蒜搗餅安臍心令實著艾灸三十壯治小便不通小便不禁膀胱不約為遺尿因歸之腎冷用韭子丸六兩炒佐以鹿茸肉蓯蓉牛膝巴戟菟絲石斛杜仲肉桂當歸地黃等藥阿膠散治濕阿膠二兩炒牡蠣煅鹿茸酥炙四兩煎散任下茯苓丸治心腎虛淋瀝赤白茯苓各二兩地黃汁好酒熬膏丸鹽酒下證大小便閉者外有骨熱不同關格者外有肝實熱心實熱便利不禁者外有風濕肝痹不同腎臟風乃濕治陰莖癢痛不忍苦參大黃荊芥皂角洗熏陰胞癢蟲蝕方狗脊不用金毛者黃連黃柏黃丹水銀粉光粉赤石脂為末敷好又方大甘草湯浸海螵蛸末敷二十頭目痛附腦痛眉骨痛脈寸脈緊急或短皆曰頭痛又浮而滑為風痰主頭目痛脈反短澀者死又卒然無所見者死腦痛脈緩大者死太陽頭痛脈浮緊惡風寒少陽頭痛脈弦細有寒熱陽明頭痛脈浮緩長自汗太陰頭痛脈沉緩必有痰厥陰頭痛脈浮緩為冷厥少陰頭痛脈沉細為寒厥左屬風右屬痰因有風有痰者多風痰結滯痛甚者火多火曰炎上血虛頭痛者亦多血不上榮諸經氣滯亦頭痛乃經氣聚而不行也證治太陽頭痛兼項痛足太陽所過攢竹痛也惡風寒羌活川芎主之陽明頭痛自汗發熱石膏白芷葛根升麻主之少陽頭痛額角上偏痛往來寒熱柴芩主之太陰頭痛有濕痰實體重腹痛半夏南星蒼朮主之少陰頭痛主三陰三陽經不流行而足寒逆為寒厥細辛主之厥陰頭痛頂痛血不及或痰吐涎沫厥冷吳茱萸主之氣虛頭痛黃耆主之病則耳鳴九竅不和參耆主之血虛頭痛芎歸主之傷寒頭痛從傷寒法治之太陽證麻黃湯桂枝湯陽明脈洪白虎少陽柴胡太陰脈浮則桂枝脈沉則理中少陰麻黃加辛附子厥陰桂枝麻黃各半湯痰厥頭痛吐之火作痛清之散之傷暑亦同濕熱頭痛證則心內煩外有腳氣亦能頭痛其狀吐逆寒熱便溲不通有谷疸亦頭痛半夏白朮天麻湯治痰厥頭痛天麻五分木香一錢半夏七錢半黃耆五分蒼朮陳皮各半錢人參澤瀉各一錢神麯一錢炒乾薑黃柏二錢茯苓五分清空膏治風濕熱及諸般頭痛惟血虛不治羌活黃連酒製防風各一錢柴胡七錢川芎五錢甘草一錢半黃芩三錢白湯調下巔頂痛加蔓荊子藁本芎歸湯治血虛自魚尾上攻茶調散吐頭痛有痰家珍方治偏頭痛連睛痛石膏黍黏子炒為末酒下玉壺丸治風濕頭痛亦治痰患雄黃白朮南星半夏天麻香芎散治一切頭風香附二兩炒去毛川芎甘草一兩炙石膏半兩細辛防風草烏川烏白芷荊芥羌活煎諸頭痛有六證傷風頭痛或半邊偏痛皆因冷風所吹遇風冷則發脈寸浮者是也食積因胃中有陰冷宿食不化上衝頭痛右手脈浮緊甚者是也氣虛因下部氣虛上攻溫溫而痛者異乎邪毒所攻無邪脈尺虛浮是也傷寒在太陽經其痛如破關前脈數是也緊數是也陽明經胃熱上攻右關洪大而數是也膈上有風涎冷痰而或嘔吐脈弦細出於寸口是也陰毒傷寒身不熱脈沉細目痛皆血有太過不及皆能為痛太過則目壅塞而發痛不及則無血養而枯痛目之鋭眥少陽經也血少氣多目之上綱眥太陽經也血多氣少目之下綱陽明經也血氣俱多唯足厥陰連於目系而已血太過者血得太熱而溢於上所以作痛治法血實者決之虛者補之宜以辛散之涼以清之汗之吐之腦痛乃風熱乘虛而入於腦以辛涼之藥散之行之眉骨痛乃風痰羌活湯治風熱壅盛上攻頭目昏眩疼痛及腦疼羌活防風黃芩酒炒一兩黃連一兩酒製柴胡七錢黃柏酒炒栝蔞根酒製甘草茯苓各半兩澤瀉三錢羌附湯治冬大寒犯腦痛齒亦痛名曰腦風麻黃黑附升麻防風白殭蠶黃柏三錢羌活蒼朮各五分甘草白芷黃耆一錢作一服眉骨痛方羌活防風甘草黃芩酒炒白朮半夏南星細辛又方加烏頭草烏童便炒去毒為君藿香散治腦風頭痛藿香川芎天麻蔓荊子槐花白芷酒調下吹搐方治同上穀精草銅緑各二錢另硝石一錢另研吹鼻中細辛瓜蒂良薑各一錢硝五錢含水滿口以藥搐鼻荊芥薄荷木賊殭蠶蠍梢茶清下二錢風成寒中則泣出風氣與陽明入胃循脈而上至目內眥人瘦則外泄而泣宜辛溫風成熱則目黃風氣與陽明入胃循脈而上至目內眥人肥不得外泄故熱鬱也二十一眩暈因痰飲隨氣上伏留於陽經遇火則動去血過多亦使眩暈頭眩亦然兼挾氣虛證外因者風在三陽經頭重項強有汗寒則掣痛暑則熱悶濕則重著皆令吐逆暈倒內因者因七情致臟氣不行鬱而生涎結為飲隨氣上厥伏留陽經嘔吐眉目疼痛眼不得開因房勞飢飽去血過多者眼花屋倒起則暈倒治散風行濕湯治痰火暈眩二陳湯蒼朮黃芩羌活瓜蒂散治暈眩痰厥芎歸湯治血虛眩暈參朮湯治挾氣虛頭痛補氣降火為主人參白朮黃芩黃連二十二心腹痛脈陽微陰弦胸痹而痛責在極虛短而數心痛心煩心腹痛不得息脈細小遲者生堅大實者死若腹痛脈反浮大而長者死趺陽脈滑而緊滑者穀氣強胃氣實緊者陰氣勝故痛病腹痛而喘脈滑而利數而緊者實也心痛有熱厥寒厥大實因勞役太甚飲食失節中氣不足或寒邪乘虛而入客之或久不散鬱而生熱或素有熱虛熱相搏結於胃脘而痛或有實積痰飲或氣與食相郁不散停結胃口而痛證治胃病者腹䐜脹胃脘當心而痛上支兩脅膈咽不通食飲不下脾病者食則嘔吐腹脹喜噫胃脘痛心下急熱厥心痛身熱足痛四肢寒甚則煩躁而吐額自汗脈洪可汗刺太溪崑崙寒厥心痛手足逆通身冷汗便利溺清不渴氣脈微弱可溫大實心痛卒然而發大便或祕久而注悶心胸高起按之痛不能飲食可下腎心痛與背相接瘈如從後絞觸其心偃僂刺束骨合骨崑崙胃心痛腹脹胸滿刺大都太白脾心痛如錐刺刺然谷太溪肝心痛狀如死終日不得休息取行間太衝肺心痛臥若徒居心痛間動作益盛刺魚際太淵厥心痛乃寒邪客於心包絡也宜以良薑菖蒲大辛熱之藥蓋諸心痛皆少陰厥氣上衝也刺之宜通氣行氣無所凝停也腹痛因有客寒阻之不行有熱內生鬱而不散有死血食積濕痰結滯妨礙升降故痛蓋痛當分其部分從其高下而治之證治中脘痛太陰也理中草豆蔻主之小腹痛厥陰也正陽回陽四逆湯主之雜證而痛苦楝湯酒煮當歸丸丁香楝實丸等主之腹中不和而痛者以甘草芍藥湯主之傷寒誤下傳太陰經腹滿而痛桂枝芍藥主之痛甚桂枝大黃湯主之夏月肌熱惡熱脈洪實而痛黃芩芍藥主之諸蟲痛者如腹痛腫聚往來無有休息涎出嘔吐清水痰積腹痛隱隱然得熱湯辛物則暫止宜導痰解鬱氣溫散之中氣虛亦痛或飢而痛是也理中湯主之胸痹皆痰水宿飲停留不散宜栝蔞枳實香附芎蒼朮溫散之外有似類而痛異名心痛有心中寒有心熱有心虛有脾積有宿食留飲有胸痞腹痛有腳氣胸痛有積實小腹痛有肝脾有胞痛有筋虛有疝有腸癰金鈴子散治熱厥心痛或作或止久不愈金鈴子玄胡各一兩熱加黃連疝氣加荔枝核酒下三錢煮雄丸治大實心痛痃癖如神雄黃一兩另研巴豆五錢生用去油爛研卻入雄黃末白麵二兩上再研勻水丸梧桐子大每服時先煎漿水令沸下藥二十四粒煮三十沸撈入冷漿水沉水冷一時下一丸二十四時也加至微利為度用浸藥水下朮附湯治寒厥心暴痛脈微氣弱附子一兩炮去皮臍白朮四兩甘草二兩炙薑棗煎服術香散治心脾卒痛不忍木香蓬朮各一兩乾漆一錢炒煙盡醋湯下一錢燥飯丸治飲水吞酸作痛牆上蜆殼丸祕丹治心痛久則成郁郁久必生火川芎梔子炒蒼朮香附石鹼乾薑炒反治之法有人飽過患此以火毒治遂以黃連六錢甘草一兩一服而安矣有心痛十八年因酒牛乳痛時以一物拄之脈三至弦弱而澀吞酸七月內以二陳湯朮芩連桃郁李仁澤瀉祕丹治死血留於胃口作痛承氣湯梔子韭汁桔梗能開血氣麻黃重者須此發之蟲痛方治面上白斑唇紅能食者是苦楝根錫灰胃脘當心痛有垢積者斑蝥烏梅肉丸如緑豆大泔下一丸皂樹上菌泡湯有肥珠起飲之微泄見效未已又服無不驗草豆蔻丸治脾胃傷損客寒一切虛證心腹大痛理中建中湯治寒腹痛調胃承氣加木香檳榔湯治熱腹痛大承氣加方治有人雨後得涼腹痛甚問之於夏月投淵取魚脈沉弦而細實重按則如循刀上本方加桂兩帖又加桂桃仁兩帖又加附兩二帖下黑血二陳芎蒼丸治清痰腹痛脈滑者是二陳湯臺芎蒼朮香附白芷薑汁二十三腰痛附腰胯腫痛腰軟脈尺脈粗常熱謂之熱中腰胯痛脈大者腎虛脈澀者痰血因腎虛而致有濕熱有瘀血有外感腎虛皆起於內蓋失志傷腎鬱怒傷肝憂思傷脾皆致腰痛故使氣結不行血停不禁遂成虛損血氣去之又有房勞過者多矣濕熱亦因腎虛而生焉腎者水也氣不利而成濕熱者因腎水涸相火熾無所榮制故濕熱相搏而成痛亦有虛勞外感濕氣內熱不行而成黨錮瘀血因用力過多墮墜折納瘀血不行外感因虛襲之外有腎風腎熱腎瘧厥陰瘧皆腰痛證失志者虛云不足面黑遠行久立不能住鬱怒者腹急脅脹目視䀮䀮所祈不能意浮於外憂思者肌肉濡漬痹而不仁飲食不化腸胃脹滿房勞者精血不足無所榮養經曰轉搖不得腎將憊矣名骨痿濕熱者四肢緩足寒逆腰冷如冰冷汗精滑扇痛外感如太陽腰痛引項尻重陽明腰痛不可以顧善悲少陽如刺其皮不可俯仰太陰煩熱如有橫木居中遺溺少陰引脊內厥陰如張弓弦大抵太陽少陰多中寒陽明太陰多燥濕少陽厥陰多風熱治羌活湯治腰痛羌活獨活柴胡防風肉桂當歸如臥寒濕地足太陽少陰血絡中有凝血加歸尾蒼朮桃仁防己如濕熱痛加黃柏蒼朮杜仲川芎如虛加杜仲五味藁歸知母龜板如墜撲瘀血加桃仁麝香蘇木水蛭腎氣丸茴香丸鹿茸丸此三方補陽之不足也勞傷房室之人有之六味地黃丸封髓丹此二方補陰之不足也膏粱之人有之煨腎丸治腰痛虛杜仲炒去絲三錢上一味末之以豬腎一枚薄批五七片以鹽椒淹去腥水糝藥在內包在荷葉用濕紙數重煨熟酒下立效散玄胡索當歸肉桂等分為末酒下挫氣丹治挫氣腰痛山楂子四兩去核北茴香炒一兩為末酒下腰胯重痛因風寒濕流注經絡結凝骨節氣血不和而痛痰積趁逐經絡流注搏於血內亦然治宜流濕散風寒逐痰積氣血自然湍流也除濕丹檳榔甘遂赤芍藥威靈仙澤瀉葶藶各二兩乳香研沒藥各一兩大戟炒三錢陳皮四兩麵糊丸加牽牛末丸禹功散治同腰軟因腎肝伏熱治宜黃柏防己論余解㑊證少氣不欲言寒不寒熱不熱壯不壯停不停乃精氣虛而腎邪實矣治以澤茯疏腎實地黃牛膝麥門冬補精氣二十四肩背痛附腰髀痛脈洪大洪為熱大為風脈促上擊者肩背痛脈沉而滑者背膂痛因風濕乘肺手太陰經脈氣鬱甚不行也證病則頰頷腫頸肩臑肘臂外後臁痛汗出小便數而缺者皆風熱乘肺也小便遺溺者皆肺金虛也治宜通經益元氣散風瀉火之藥通氣散治風熱乘肺肩背痛防風藁木獨活羌活以上通經血黃芩黃連以上降火人參黃耆上二味虛則加之腰髀痛因小腸經氣小腸心痛及腑外有肺風肺寒骨虛而致二十五脅痛附身體痛脈雙弦是兩手俱弦也因肝木氣實火盛或因怒氣大逆肝氣鬱甚謀慮不決風中於肝皆使木氣大實生火火盛則肝急瘀血惡血停留於肝歸於脅下而痛病則自汗痛甚按之益甚證痰積流注厥陰亦使脅下痛病則咳嗽外有肝中風左脅偏痛肝中寒脅下攣急飲水脅下鳴相逐皆致脅痛須詳之辨非血枯證胸脅支滿絡氣不行妨於食肝脾傷病至先聞腥臊臭出清液肺葉傷也四肢清目眩復後血此年少脫血或醉行房肝傷氣竭致之故也證治木火盛宜以辛散之以苦瀉之當歸龍薈丸瀉青丸主之死血宜以破血為主潤血為佐復元活血當歸導滯等主之痰積宜以去痰行氣二陳湯加南星青皮香附青黛等主之龍薈丸治食積發熱木盛脅痛柴胡甘草青皮黃連大黃當歸木香草龍膽蘆薈川芎治水氣實加之治血湯治死血左金丸治肝火黃連六兩茱萸一兩導痰湯治痰注諸痰皆生於熱臺芎二兩香附八兩陳皮蘇葉乾薑一兩貼痛芥菜子研水敷茱萸醋研敷上大效尉痛醋炒灰熱布裹尉之蔥艾炒亦可韭汁亦可身體痛脈證傷寒太陽經表證六脈俱緊陰毒傷寒身如被打脈沉緊傷寒發汗後身體痛氣血未和脈弦遲傷濕濕流關節一身盡痛風濕相搏肢體重痛不可轉側脈緩虛勞之人氣血虛損脈弦小二十六逆痰嗽脈出魚際逆氣喘息脈弦為咳咳而浮者四十日己咳而弦者相其人強吐之而愈咳而脈虛必苦冒咳而沉者不可發汗喘咳上氣脈數有熱不得臥者死上氣面浮腫肩息其脈浮大者死久咳數歲脈弱者生實大者死上氣喘息低昂脈滑手足溫者生脈澀四肢寒者死咳脫形發熱小堅急者死肌瘦下脫熱不去者死咳嗽脈沉緊者死浮直者生浮軟者生小沉伏者死咳而嘔腹脹且泄脈弦急欲絶者死咳嗽羸瘦脈形堅大者死暴咳脈散者死浮為風緊為寒數為熱細為濕此生於外邪之所搏浮緊則虛寒沉數則實熱弦澀則少血洪滑則多痰此生於內氣之所郁因證因風寒火附腹滿勞痰風寒為病主乎肺以肺主皮毛而司於外傷之腠理不疏風寒內鬱於肺清肅之氣不利而生痰動嗽又寒飲食入胃從脾脈上至於肺則肺寒肺寒則內外合邪因之而咳火之嗽病因火盛生痰鑠肺金也遂成郁遏脹滿甚則干嗽無痰或唾血痰勞而咳嗽皆好色腎虛則子能令母虛氣血俱虛陰虛則生火肺金耗敗而津液氣血皆化為痰矣痰者礙清氣升降滯氣而不行遂成諸咳嗽之證論咳逆痰嗽分為二咳者謂無痰而有聲肺氣傷而不清而上逆皆關於肺也嗽者謂有痰而無聲脾濕動而為痰而成嗽皆積於脾也蓋因傷於肺氣動於脾濕咳而為嗽也若脾無留濕雖傷肺氣而不為痰也然寒暑燥濕風火皆令人咳唯濕痰飲食入胃留之而不行上入於肺則為咳嗽也假令濕在心經謂之熱痰濕在肝經謂之風痰濕在肺經謂之氣痰濕在腎經謂之寒痰三因論咳者衛氣之失嗽者營血之失外傷六氣隨風寒暑濕燥火感其部位而察其元以表之內傷七情皆聚於胃而關於肺多痰嗽也衛氣之失則多痰逆營氣之失則多痰嗽也張論以貧富言之貧者謂之咳嗽外感之由也內經曰秋傷乎濕冬必咳嗽是也又曰歲火太過肺金受病民病咳嗽是也富貴者謂之涎嗽多飲食厚味熱痰所成也李論皆脾弱受病肺金受邪飲食不化精微留積而成痰肺氣不利而痰沖清道而成咳劉論皆脾濕入於肺而成痰傷風而成咳痰嗽潮熱四證有痰嗽者潮熱大體雖同動作有異或因虛中寒冷則先痰嗽嗽久而不已血形如線隨痰而出惡寒發熱右寸浮而數外證日輕夜重面白痰清因憂愁大怒則吐血而後痰嗽少寒多熱左寸沉小而數外證心下噎塞情思不樂飲食不下或蠱注相傳死魂相逐則先嘔血不知來處微有痰嗽漸成寒熱兩手脈弦細而數外證飲食不為肌膚頰紅變動不常身體痠痛倦及嗽損咽痛多痰或喘或瀉則死先因傷濕傷寒解利不盡雖病退人起飲食減少不生肌肉身倦無力勞力則熱身體痠痛狀如勞伏但不吐血不發潮熱經二三年醫無驗此是餘毒伏在經絡其脈弦也再發則愈三因論狀傷風咳者憎寒壯熱自汗惡風口乾煩躁傷寒咳者憎寒發熱無汗惡寒不幹煩躁傷暑咳者煩熱引飲口燥或吐沫聲嘶咯血傷濕咳者骨節煩痛四肢重者灑灑淅淅喜傷心咳而喉中介介如腫狀甚則咽腫喉痹自汗咽乾咯血此勞傷心小腸受之咳與氣俱失怒傷肝咳而兩脅下痛不可轉側則兩胠下滿左脅偏痛引少腹此怒傷肝膽受之咳嘔膽汁思傷脾咳而右脅下痛隱隱引肩背甚則不可動腹脹心痛不欲食此飢飽之傷胃受之咳而嘔嘔則長蟲出憂傷肺咳而喘息有聲甚則吐血吐白沫涎口燥聲嘶叫呼傷肺大腸受之咳而遺矢恐傷腎咳而腰背相引痛甚則嗔咳涎寒熱引腰背或喘滿房勞傷腎膀胱受之咳而遺溺久咳不已三焦受之咳而腹滿不飲食咳嗽喘逆氣短氣分別不同咳者無痰有聲喉中如癢習習如梗甚則續續不止連連不已沖膈擊胸外有心咳一切血證肺咳上逆嗽者有痰外有勞瘵喘促嗽血肺痿肺癰喘者促促而氣急喝喝而息數張口抬肩搖身攘肚外有腳氣逆氣者但腳氣上而奔急外有肺中風肺中暑肺熱肺寒肺水肺痹肝熱膽寒心熱腸痹痰水短氣者呼吸難數則不能相續似喘而不搖肩似呻吟而無痛外有脾中風脾中寒肺熱腎虛歷節風憂氣胸痞痰飲治咳嗽謂無痰而有聲素問云咳乃皮毛先受邪氣以從其合其寒飲食入胃從脾脈上至肺肺寒則內外合邪因有咳證肺咳麻黃湯大腸遺矢赤石脂禹餘糧湯桃仁湯脾咳升麻湯胃吐蟲出烏梅湯心咳桂枝湯小腸氣失芍藥甘草湯肝咳小柴胡湯膽嘔苦汁黃芩半夏湯腎虛麻黃細辛附子湯膀胱遺溺茯苓甘草湯久咳不已三焦受之其狀咳腹滿不欲飲食此皆聚於胃關於肺令人多涕唾而面浮腫氣逆也異功白朮散逆逆謂氣上逆肺壅而不下上氣逆者皂莢丸火逆上氣麥門冬湯上氣脈浮者麻黃厚補湯上氣脈沉者澤漆湯澤漆五桑白皮六射干泔浸黃芩白朮茯苓四竹茹治氣上逆為熱所作治法無痰而有聲者以辛潤其肺青皮以散三焦之氣壅有痰而嗽者治痰為先下氣為上痰而能食者下之不能食者厚朴湯治之痰而熱者柴胡湯加石膏主之痰而寒者小青龍加桃仁主之張之治痰以通聖散加半夏暑嗽以白虎涼膈火嗽以黃連解毒濕嗽以五苓白朮燥嗽以木香葶藶散寒嗽以寧神寧肺散為上也更分以吐汗下為佳方南星半夏枳殼陳皮風痰脈弦加通聖熱痰脈滑小柴胡洪加青黛連氣痰脈澀加青陳皮濕痰脈緩加朮防己寒痰脈沉加桂杏小青龍發熱加芩桔痞加枳實重加茯苓氣上逆加葶藶氣促加參桔浮腫加郁李仁杏仁澤瀉茯苓上熱喘湧加寒水石石膏大便祕加大黃能食加大承氣不能食加朴利膈丸治胸中不利痰嗽喘促木香檳榔一錢半枳實炒一兩朴三兩大黃酒製一兩人參當歸各三錢紫蘇飲子治脾肺受寒痰涎嗽紫蘇子桑白皮青皮陳皮杏仁麻黃炙甘草五味子半夏人參千緡湯治痰妙半夏一兩生大皂角半兩去皮子雄黃加之大治痰上同入絹袋中水三升姜八片煎至半以手操洗之取清汁服大熱大飲凝於胸中而成濕故痰作矣宜吐之二陳湯加麻黃杏仁湯治風寒行痰開腠理本方加麻黃杏仁桔梗降火導痰湯治火黃芩黃連栝蔞海石勞嗽丹四物竹瀝薑汁斂肺丹治肺脹及火鬱訶子杏仁青黛栝蔞半夏香附積痰方南星半夏青黛栝蔞石鹼如肝痛疏肝氣加青皮上半日咳多屬胃火加貝母石膏下半日嗽多屬陰虛加知母柏川芎歸虛甚好色者加參膏青陳皮姜酒病嗽白礬一兩另研杏仁一升上水一升煎乾攤新瓦上露一宿砂鍋內炒乾每夜飯後細嚼杏仁十五個劫嗽方五味半兩甘草二錢五倍子風化硝各一錢為末干噙化鵝管法治風入肺管南星雄黃款冬花鵝石上為末入艾中放薑片上置舌上灸吸烟入喉以多為妙痰方若或痰白作泡當於肺中瀉水滑石川貝母半夏風化硝白芥子陳皮茯苓皂角風加蒼朮濕加栝蔞潤加枳實結加青黛黃芩熱加青礞石丸化痰麝香丸治痰勞嗽方四君子百合款冬花細辛肉桂五味子阿膠半夏天門冬杏子白芍甘草煎食三因論因怒而傷者甘草憂而傷者枳殼喜而傷者五味悲而傷者人參二十七喘附哮脈證實喘氣實肺盛呼吸不利肺竅壅滯右寸脈沉實者是宜瀉肺虛喘由腎虛呼吸氣短兩脅脹滿左尺脈大而虛者是宜補腎邪喘由肺感寒邪伏於肺經關竅不通呼吸不利右寸脈沉而緊亦有六部俱伏者宜發散則身熱而喘定三因狀虛實肺實者肺必脹上氣喘逆咽中塞如嘔狀自汗肺虛者必咽乾無津少氣不足以息也因氣虛入於肺陰虛火起衝上有痰有水氣乘肺治喘年深時作時止雄豬肚一個治如食法入杏仁四五兩線縫醋三碗煮乾取出先食肚次以杏仁新瓦焙捻去皮旋食永不發氣虛方治氣虛人參黃柏蜜炙麥冬地骨皮血虛方治陰虛有痰四物黃連枳殼半夏導痰千緡湯半夏南星陳皮茯苓皂角枳實劫藥方治喘不止甚不可用苦寒藥可溫劫之椒目二錢為末薑湯下萊蔔子蒸皂角燒存性薑汁丸噙大黃煨牽牛各二兩炒各為末蜜水下二錢治熱痰暴喘欲死瀉白散治陰氣在下陽氣在上咳喘嘔逆桑白皮一兩青皮五味甘草茯苓人參杏仁半夏桔梗上二味痰涎嘔逆加之地骨皮七錢姜煎神祕湯治水氣逆行乘肺肺得水而浮使氣不通流脈沉大此人不得臥臥則喘者是紫蘇陳皮桑白皮生薑人參各五錢木香茯苓二錢哮因哮喘主於內痰宜吐之治哮積丹雞子略敲不損膜浸尿缸內四五日夜吃之有效蓋雞子能去風痰蘿蔔子丸薑湯送下妙

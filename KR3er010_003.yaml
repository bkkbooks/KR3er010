body:
  text: 卷三二十八宿食留飲附痰飲脈寸口脈浮大按之反澀尺中亦微而澀故有食痰寸口脈緊如轉索左右無常者有宿食脈滑而數者實也有宿食當下之脈浮而滑者宿食下利不欲食者宿食脈沉病若傷寒者宿食留飲宜下之脈短疾而滑者酒病脈浮細而滑者傷飲因飲食自倍腸胃乃傷復加之則胃化遲難故宿食留飲飲水也無形之氣也因而大飲則氣逆形寒飲冷則傷肺病則為咳滿水泄重而為蓄積食者物也有形之血也因而食飽筋脈橫解腸澼為重或嘔或吐或下利證治千金云胃中有癖食冷物則痛不能食有熱物則欲食大腹有宿食即寒凜發熱如瘧狀小腹有宿食當暮發熱明旦復止三因云有飲在中脘則嘈有宿食則吞酸李論戊己火衰不能制物食則不消傷其太陰填塞悶亂兀兀欲吐甚則心胃大痛犯其血也治宜分寒熱輕重如初得上部有脈下部無脈其人當吐不吐即死宜瓜蒂散輕則內消縮砂炒曲等是也重則除下承氣湯是也寒則溫之半夏乾薑三稜莪朮是也熱則寒之大黃黃連積實麥芽是也飲則下行或大飲而氣逆或寒冷而傷肺病則喘咳痰涎水腫輕則宜取汗利小便使上下分消其濕解醒湯五苓散半夏朮枳殼之類是也重則為蓄枳為滿者三花神祐是也張論飲食不消分貧富而治之富者乃膏粱太過以致中脘停留脹閉痞膈醋心宜木香導飲丸主之貧者乃動作過勞飲食粗酒食傷之以致身腹滿悶時吐酸水宜進食丸主之又有重者病證同太陰傷寒止脈沉可與導飲丸治之又論留飲蓄水而已雖有四有五之説止一證也夫鬱憤而不伸則肝氣乘脾之氣而不流亦為留飲肝主慮久不決則氣不行脾主思久則脾結亦為留飲因飲水脾胃久衰不能布散亦為留飲飲酒過多胞經不及滲泄亦為留飲渴飲冷水乘快過多逸而不動亦為留飲夫水者陰物也但積水則生濕停酒則滿燥久而成痰左脅同肥氣右脅同息賁上入肺則嗽下入大腸則瀉入腎則湧在太陽為支飲皆內氣逆得之故濕在上者目黃面浮在下者股膝腫滿在中者支飲痞膈痰逆在陽不去久而滯氣在陰不去久而成形宜治以導水禹功調以五苓葶藶椒目逐水為全矣有傷西瓜冷水羊乳寒濕之物宜白朮二錢川烏五分防風一錢丁香一枚甘草炙一錢傷羊肉面濕熱之物宜白朮黃芩黃連各七錢大黃二錢甘草炙五分如心下痞枳實腹痛白芍藥一錢腹脹厚朴胸中不利枳殼胸中寒陳皮渴者白茯苓腹中窄蒼朮體肢沉重蒼朮大抵傷冷物以巴豆為君傷熱物以大黃為君檳榔丸治傷之輕者飲食不化心腹鼓脹出劉檳榔二錢陳皮八錢牽牛頭末四錢醋糊丸梧子大薑湯送下二十丸雄黃丸治傷之重脅肋虛脹者雄黃一兩另研巴豆五錢生用去油丸服法同心痛瓜蒂散主吐心腹卒痛悶亂急以治之瓜蒂赤小豆各三錢細末之每服一錢溫酒下枳實丸治傷食枳實半兩白朮一兩曲丸木香檳榔青皮此三味氣滯加之大黃黃芩黃連此三味濕熱加之蘿蔔子黃連澤瀉伏濕痞悶加之梔子病後食傷加之半夏豆粉濕面油膩加之草豆蔻稜莪傷冷硬加之乾薑傷水加之縮砂丁香心胃痛加之人參傷胃加之解酲湯治傷酒白豆蔻砂仁生薑葛花各半兩白茯苓豬苓去皮陳皮去白人參白朮各一兩半青皮三錢神麯炒澤瀉各二錢五分木香五分上為末白湯送下祕方治胃中有物惡食二陳湯加白朮山楂川芎蒼朮神麯炒神祐丸治留飲懸飲脈弦又治脈伏其人欲自利難利心下續堅滿此為留飲欲去故也茯苓桂術湯治心下有痰飲胸脅支滿目眩茯苓官桂白朮甘草大青龍湯治溢飲體痛當發其汗麻黃七錢官桂甘草各二錢五分石膏雞子大杏仁半夏濕加澤瀉湯治心下有支飲其人苦冒眩支飲不得息加葶藶棗朴黃湯治支飲胸痛大黃厚朴各等分二陳湯小半夏湯治嘔家本渴今反不渴心下有支飲故也治先渴卻嘔水停心下此屬飲加茯苓五苓散治瘦人臍下有悸者吐涎沫而顛眩水也亦治停痰宿水破飲丸治五飲結為癰瘕支飲胸滿吐逆心內隱痛大能散氣蓽茇胡椒丁香縮砂青皮烏梅木香蠍梢巴豆去油以青皮同巴豆浸漿水一宿漉出同炒青皮焦去豆將浸水淹烏梅肉炊一熟飯研細為膏薑湯送下五七丸控涎丹治患胸背手足頸項腰胯隱痛不忍連筋骨牽釣痛坐臥不安時走易甘遂大戟紅牙白芥子真上粉丸梧子大白湯送下痰飲證狀或咳或喘或嘔或泄眩暈嘈煩忪悸愪寒熱疼痛腫滿攣癖癃閉痞膈如風如癲懸飲者水飲在脅下咳唾引痛溢飲者飲水流於四肢當汗不汗身體疼痛重支飲者嘔逆倚息短氣不得臥其形如腫痰飲者其人素盛今瘦腸間漉漉有聲留飲者背寒如手大或短氣而渴四肢歷節疼痛脅下痛引缺盆伏飲者膈滿咳喘嘔吐發則寒熱腰背痛目淚惡寒振振然懸飲當下溢飲當汗支飲隨證汗下之痰飲宜溫之從小便去之二十九噯氣吞酸嘈雜附䅽氣因胃中有火有痰三因論醋咽夫中脘有飲則嘈有宿食則酸食後噫酸吞酸者皆食證俗名咽酸治方食鬱有痰吞酸南星半夏五錢黃芩一兩陳皮燥飲丸治痰飲心痛干螺殼牆上者蒼朮神麯為丸曲術丸治吞酸中脘有飲則嘈宿食則酸縮砂陳皮蒼朮神麯炒曲丸薑湯送下又方治酸皆濕熱鬱黃連薑汁炒蒼朮茯苓湯浸餅丸吐清水蒼朮陳壁土炒茯苓一錢滑石煨術一錢五分陳皮五分水煎論䅽氣證夫䅽飪之邪從口入者宿食也其病煩痛畏風憎寒心腹脹滿下利不欲食吞酸噫宿腐氣或腹脹瀉泄及四肢浮腫若胃實熱食反留滯其脈滑而數宜下之愈若脾虛其脈浮大按之反澀尺中亦微澀宜溫消之木香丸木香硇砂蓬朮胡椒半夏乾漆炒令煙盡各五錢桂心縮砂青皮各三錢附子炮去皮臍三稜醋炙乾薑各一兩上末蜜丸梧子大每服五十丸薑湯下感應丸肉豆蔻川芎百草霜各二兩木香一兩五錢蓽澄茄丁香三稜各一兩巴豆百粒去皮蠟四兩杏仁百粒去皮上除巴豆外為末以下別研巴豆杏仁和勻先將油煎蠟溶化傾出藥末內和成劑入臼內杵千餘下丸緑豆大每服三五丸白湯下又外有醋咽䅽氣思膈皆同三十積聚脈來細而附骨乃積寸口積在胸關上積在臍旁尺中積在氣衝左積左右積右脈兩出積在中央浮而毛按之辟易脅下氣逆背相引痛名肺積沉而芤上下無常處胸滿悸腹中熱名心積弦而細兩脅下痛邪走心下足腫寒名肝積沉而急若脊與腰相引痛飢見飽減名腎積浮大而長飢減飽見腹滿泄嘔脛腫名脾積寸口沉而結快而緊積聚有系痛脈弦細微者為癥橫脅下及腹中有橫積脈弦腹中急痛為瘕脈細而沉時直者身有癰腫若腹中有伏梁脈沉小而實者胃有積聚不下食食則吐脈沉而緊者若心下有寒時痛有積聚關上脈大而尺寸細者必心腹冷積遲而滑中寒有症脈弦而伏腹中有症不可轉也死脈緊強急者生虛弱者死沉者死因脛寒厥氣則血脈凝澀寒氣上入腸胃所以腹脹腹脹則腸外之汁沫迫聚不得散日以成積又盛食多飲起居過度腸胃之絡傷則血溢於腸外腸外有寒汁沫與血相搏則氣聚而成積又外中於寒內傷於憂怒氣則上逆上逆則六腧不通濕氣不行凝血蘊裹津液凝澀滲著不去而成積又生於陰蓋憂思傷心重寒傷肺忿怒傷肝醉以入房汗出當風傷脾用力過度入房汗出入浴傷腎皆臟氣不平凝血不散汁沫相搏蘊結而成積矣又有食積酒肉積水積涎積血積氣積皆因偏愛停留不散日久成積塊在中為痰飲在右為食積在左為血積證蓋積聚之源則一其在臟者始終不移為積其在腑者發痛轉移隨氣結束為聚積者繫於臟聚者繫於腑癥者繫於氣瘕者繫於血肝之積名肥氣在左脅下如覆盆發咳逆痎瘧連歲不已其中有血肝主血故也心之積名伏梁起臍下大如臂上至心下令人煩心有大膿血在於膈胃之外肺之積名息賁在右脅下大如杯灑淅寒熱喘咳肺壅賁者賁門也積在肺下有賁門脾之積名痞氣在胃脘大如盤四肢不收黃疸飲食不為肌痞者濕也食冷其人傷氣為濕所蓄腎之積名奔豚發於小腹上至心下若豚狀上下喘息骨痿病在六腑太陽利清氣陽明泄濁氣少陽化精氣失常則壅聚不通故實而不轉虛則輸屬陽無形隨氣往來在上則格在下則脹旁攻兩脅如有泥塊易於轉變故名曰聚又有息積者乃氣息癖滯於脅下不在臟腑營衛之間積久形成氣不幹胃故不妨食病者脅下滿氣逆息難頻噦不已名曰息積治法寒者熱之結者散之客者除之留者行之堅者削之消者摩之咸以軟之苦以瀉之全真氣以補之隨其所利而行之酒肉食等積以所惡者攻之以所喜者誘之五積丸治積塊黃連肝腎五錢心肺一兩半脾七錢厚朴肝心脾五錢肺胃八錢巴豆霜五分川烏肝肺一錢腎脾五錢乾薑心肝五分腎一錢五分茯苓一錢五分人參肝肺腎二錢心五錢另研巴豆旋入和勻煉蜜丸梧子大微溏為度肝積加柴胡二兩皂角二錢五分川椒四錢昆布二錢莪朮三錢五分心積加茯苓三錢肉桂一錢茯神一錢丹參一錢菖蒲五錢肺積加桔梗一錢紫菀一錢五分天門冬一錢三稜一錢青皮一錢陳皮一錢川椒一錢五分白豆蔻一錢腎積加玄胡三錢苦楝肉三錢全蠍一錢附子一錢澤瀉二錢獨活三錢肉桂三錢菖蒲二錢丁香五錢脾積加吳萸二錢澤瀉一錢茵陳二錢縮砂二錢川椒五錢秋冬加制朴一倍減芩連服人覺熱加連覺悶亂加桂氣短減朴又有虛人不可直攻以蠟匱其藥又且久留磨積肉積硇砂水銀阿魏酒積神麯麥芽血積虻蟲水蛭桃仁大黃氣積檳榔木香水積甘遂牽牛芫花涎積雄黃膩粉食積礞石巴豆癖積三稜莪朮魚鮮積陳皮紫蘇草果丁香桂心寒冷成積附朴硫黃化氣湯治息積癖於腹脅之下脹滿瘀痛嘔吐酸水縮砂肉桂木香各一錢甘草炙茴香炒丁香青皮炒陳皮生薑炮各五錢沉香胡椒各一錢上為末薑紫蘇湯鹽酒調二錢一分散聚湯治久氣六聚狀如癥瘕隨氣上下發作有時心腹絞痛攻刺脅腰喘咳滿悶䐜脹半夏檳榔當歸各三錢陳皮杏仁肉桂各二錢茯苓甘草炮附川芎枳殼吳萸厚朴制各一錢大黃大便祕加之三聖膏貼塊石灰末化者半斤瓦器炒令淡紅出候熱稍減研之大黃一兩末之就爐微炒候涼入桂桂心半兩末略炒醋熬成膏厚攤貼患處又方大黃朴硝各一兩末大蒜搗膏貼之亦佳張法無憂散治諸積不化桂苓白朮散調之茶調散治沉積水氣木香檳榔丸調之千金硝石丸止可磨塊不令困人須量虛實硝石六兩大黃半斤甘草人參各三兩上為末以三年苦酒即好醋也三升置筒中以竹片作三片刻先納大黃攪使微沸盡一刻乃下余藥又盡一刻微火熬膏丸梧子大每服三十丸消塊丸此必審確可用三稜莪朮削堅青皮陳皮破氣香附調氣桃仁紅花治血靈脂破血甘草牛膝死血用石鹼破痰塊二陳湯皮裡膜外多痰加之山楂食塊加之吳茱萸炒一錢五分益智炒一錢五分葵根白朮等分鹼石湯下茶癖散石膏黃芩升麻砂糖調服治痰塊苦參半夏瓜蒂薑蜜丸破塊驗丸吳茱萸黃連木香檳榔桃仁郁李仁又承氣加連芍川芎乾葛湯下又栝蔞半夏黃連貝母丸果效三十一消渴脈心脈滑為渴滑者陽氣勝心脈微小為消疸脈軟散者氣血虛脈洪大者陽余陰虧寸口脈浮而遲浮為虛衛氣虧遲為勞營氣竭趺陽脈浮而數浮為風數消穀消疸脈實大病久可治懸小堅急病久不可治脈數大者生實堅大者死細浮短者死因證膏粱甘肥之變則陽脈盛矣陽脈太甚則陰氣不得營也津液不足結而不潤皆燥熱為病也經云二陽結謂之消二陽者陽明也手陽明主津病消則目黃口乾是津不足也足陽明主血熱則消穀善飢血中伏火乃血不足也此皆津血不足而熱也夫因則火一也病則有上中下三也蓋心火盛於上為膈膜之消病則舌上赤裂大渴引飲論云心移熱於肺傳為膈消是也以白虎加參湯主之火盛於中為腸胃之消病則善食身瘦自汗大便硬小便數論云疸成為消中者是也以調胃承氣三黃等治之火盛於下為腎消病則煩躁小便濁淋如膏油之狀論云焦煩水易虧者是也六味地黃丸主之治法熱淫所勝治以甘苦甘以瀉之熱則傷氣氣傷無潤則折熱補氣非甘寒不治李以補肺降火生血為主祕丹生血為主總治三消黃連花粉人乳地黃汁藕汁上蜜為膏徐徐留舌上以白湯下參膏湯治膈消上焦渴不欲多飲人參五錢石膏一兩知母六錢甘草三錢五分水煎或方加寒水石妙順氣散治消中能食小便赤川朴一兩大黃四兩枳殼二兩赤芍藥一錢茴香散治腎消小便如油茴香苦楝炒五味上為末酒下二錢食前服珍珠丸治白淫滑泄思想無窮所願不得之證黃柏一斤燒真蛤粉一斤水丸空心酒下柏降火蛤咸補腎又方蘆根栝蔞根麥門冬知母竹葉牛乳生津甘露飲已下出李石膏甘草滋水之源黃連山梔黃柏知母瀉熱補水杏仁麥冬全蠍連翹白葵白芷歸身蘭香和血潤燥升麻柴胡經行木香藿香反佐取之桔梗為末舐之酒煮黃連丸治中暑熱渴太陽渴脈浮無汗五苓滑石類陽明渴脈長有汗白虎涼膈等少陽渴脈弦而嘔小柴胡加栝蔞太陰渴脈細不欲飲不思水少陰渴脈沉而自利者豬苓三黃湯厥陰渴脈微引水少與之神芎丸已下出張黃連入心牽牛逐火滑石入腎大黃逐火黃芩入肺薄荷散熱三黃治消渴大黃春秋二兩夏一兩冬五兩黃芩春四兩秋夏六兩冬三兩黃連春四兩秋夏七兩冬三兩桂苓甘露飲調之白虎湯調之生藕節汁淡竹瀝汁生地黃汁相兼服之潤之寒水石甘草蛤粉等分濃煎麥門冬苗下二錢神白散治真陰虛損豬肚丸治消中豬肚一個黃連五錢麥冬去心知母栝蔞上四件末入肚縫之蒸爛熟於砂盆內杵而丸之如堅少加蜜丸梧子大每服五十丸葛根丸治腎消葛根栝蔞各二兩鉛丹二兩附子一兩炮蜜丸如梧子大一日三服春夏去附胡粉散治大渴又治腎消栝蔞根二兩五錢胡粉五錢鉛丹五錢澤瀉石膏白石脂赤石脂各五錢甘草炙三兩五錢上杵為末任意服痛者減服人參白朮湯人參白朮當歸白芍山梔澤瀉大黃各五錢連翹栝蔞根茯苓各一兩肉桂藿香木香各一錢寒水石二兩滑石朴硝各半斤甘草三兩石膏四兩薑煎入蜜少許口燥口乾口渴咽乾須詳之三十二痞因誤下陰虛食積痰滯濕土虛痞論曰太陰濕土為積飲痞膈乃土來心下痞滿也證治誤下多則亡陰胸中之氣因虛而下陷於心之分野宜升胃氣以血藥治之亡陰謂脾胃水穀之陰亡也痰積痞膈胸中窄塞宜消導之謂之實痞濕土虛痞有二大便祕能食者厚朴枳實主之大便利者芍藥陳皮主之治法以瀉心湯黃連為君瀉心下之土邪厚朴降氣三因論狀心下堅滿痞急痛如刺不得俯仰其胸前皮皆痛短氣咳唾引痛咽塞不利習習如癢喉中乾燥嘔吐煩悶自汗時出痛引徹背外有心熱而痞之痞則滿硬結胸則痛屬胸痹大消痞丸治濕土痞虛氣痞黃連炒黃芩各三錢薑黃一錢白朮半夏各一兩甘草炙一錢縮砂一錢枳實炒生薑各五錢陳皮二錢神麯一錢炒厚朴三錢澤瀉豬苓各一錢五分丸梧子大白湯送下木香有憂氣結中脘心下痞滿肚皮底微痛加之否則不用利膈丸除痰利膈黃芩生炒各一兩黃連南星半夏各五錢枳殼陳皮各三錢白朮二錢白礬五分澤瀉五錢神麯五錢炒栝蔞丸治胸痞或脅下逆搶心栝蔞子枳實陳皮取栝蔞皮穰末熬丸胸痞切痛加梔子燒存性附子炮各二兩三十三腫脹脈遲而滑者脹盛而緊曰脹陽中有陰也故下之趺陽緊而浮緊為痛而堅滿浮為虛則腸鳴弦而遲者必心下堅又肝木克脾土鬱結涎閉於臟氣腑氣不舒胸則脹閉脈浮而數浮則虛實則數脈浮風水皮水皆浮虛緊澀者脹憂思連結脾肺氣凝大腸與胃不平而脹脈石水黃汗皆沉脈浮而滑名風水浮而遲浮熱遲濕濕熱相搏石水必矣弦而緊弦則衛氣不行水走腸間水滿腹大如鼓脈實者生虛者死洪大者生微者死腹脹便血脈大時絶極脈小疾者並死中惡腹大四肢滿脈大而緩者生緊大而浮者死緊細而微者亦生因證蓋腫脹之因其始則一其變則二皆脾胃之土生焉水腫之因蓋脾虛不能制水腎為胃關不利則水漬妄行滲透經絡其始也目窠上微腫頸脈動咳陰股寒足脛脹腹乃大其水已成矣按其腹隨手而起如裹水之狀短氣不得臥者為心水小腹急滿為小腸水大便鴨溏為肺水乍虛乍實為大腸水兩脅痛為肝水口苦咽乾為膽水四肢重為脾水小便澀為胃水腰痛足冷為腎水腹急肢瘦為膀胱水然此十水謂之正水審脈證分經絡而治之風水脈浮惡風歸肝皮水脈亦浮不惡風喘渴按沒指歸肺石水脈沉不惡風歸腎黃汗脈沉遲發熱而多寒歸脾治法腰以上腫宜汗腰以下腫宜利小便主治使補脾氣實則能健運以參術是也佐以黃芩麥冬制肝木腹脹加厚朴氣不運加沉木香使以通利是必痊矣開鬼門潔淨府正此謂也外有濕腫用加附子脈沉細是也又有腫痛為中寒也加炮附是也脹滿皆脾土轉輸失職胃雖受谷不能運化精微聚而不散隧道壅塞清濁相混濕鬱於熱熱又生濕遂成脹滿又寒濕抑遏遏於脾土之中積而不散而脹即經云臟寒生滿病是也又五積痰飲聚而不散或宿食不化皆成脹滿煩心短氣臥不安為心脹虛喘咳滿為肺脹脅痛引小腹為肝脹善噦四肢脫體重不勝衣臥不安為脾脹引背央央然腰髀痛為腎脹腹滿胃脘痛妨食聞焦臭大便難為胃脹腸鳴痛冬寒飧泄為大腸脹小腹䐜滿引腰而痛為小腸脹小腹氣滿而氣癃為膀胱脹氣滿於膚硜硜然為三焦脹脅痛脹口苦善太息為膽脹寒氣客於皮中𪔣𪔣然不堅腹身大色不變按之不起為膚脹腹脹身皆大色蒼黃腹筋起者為鼓脹寒氣客於腸外與衛相搏氣不得營因有所繫癖而內著其大也如雞子至其成如懷胎按之則堅推之則移月事不以時下名腸覃寒氣結於子門閉塞不通惡血當瀉而不瀉血留止日以益大如胎月事不時此生於胞中為石瘕此二者皆生於女子可道而下治虛則宜補脾以養肺流濕以散氣治以參術佐以平胃茯苓熱加芩連血虛四物死血桃仁風寒外邪自表入里寒變為熱而胃實滿宜大承氣下之痰積宿食宜以消導或大黃丸下之經云去菀陳莝是也前者之外有胃寒腸熱腹脹而且泄胃寒則氣收不行為脹腸熱則水穀不聚而泄黃連木香大黃厚朴茯苓青皮茱萸又有胃熱腸寒故痛而且脹胃熱則善飢消穀腸寒則血凝脈急故痛而且脹又有頸腫膺腫胸脹皆氣不順有餘於上又有身腫而冷胸塞不能食病在骨節汗之安忌面上黑點肺敗掌中無紋心敗臍突脾敗腳根腫肝敗腹滿青筋腎敗營衛俱絶浮腫者死唇腫齒焦者死卒痛面蒼黑者死臍腫反出者死陰囊莖俱腫者死脈絶口張腫者死足趺腫脹如斗者死變水湯治腫脹白朮茯苓澤瀉各二兩郁李仁二錢煎入薑汁調以耆術為建中之類楮實丸治脹木香散治腫木香大戟白牽牛各一兩上為末三錢豬腎子一雙批作片子糝末在內煨熟空心服更塗甘遂末於肚上少飲甘草水十棗丸治腫脹五皮散治腫皮水大腹皮桑白皮茯苓皮生薑皮陳皮木香消腫丸滑石白朮木通牽牛茯苓半夏陳皮木香丁香瞿麥酒糊丸麥門冬湯下中滿分消丸治熱脹鼓脹氣脹黃芩刮黃皮一兩黃連炒一兩薑黃白朮人參豬苓甘草各一兩茯苓縮砂陳皮各三錢枳實半夏各五錢厚朴一兩廣朮饋堅湯治脹有積塊如石上喘浮腫厚朴草豆蔻歸尾黃芩益智各五錢甘草黃連白朮柴胡神麯澤瀉各三錢吳茱萸青皮陳皮各二錢半夏七錢桃仁蘇木木香紅花各一錢海金砂丸治腫牽牛生炒各半兩甘遂半兩金砂三錢白朮一兩煎服木香塌氣丸治脹胡椒草蔻麵裹煨木香各三錢蠍梢三錢五分去毒大補中氣行濕散氣湯祕傳十水丸後用尊重丸退余水炒甜葶藶澤瀉巴豆去殼出油醋煮大戟芫花醋炒甘遂醋炒桑白皮漢椒茯苓雄黃每三錢五更水下以肉壓之免噁心車水葫蘆丸止用一掃光為貴木香丁香各三錢沉香黑白醜各二錢枳殼烏藥白芷當歸各一錢茶丸尊重丸治蠱脹腹大水腫氣逆喘乏小便澀大便閉虛危甚效沉香丁香人參檳榔木香青陳皮枳實白牽牛木通車前苦葶藶赤茯苓各四錢胡椒海金砂白豆蔻蠍尾滑石各二錢五分蘿蔔子炒六錢白丁香一錢郁李仁兩半去皮薑汁糊丸薑湯下氣分與胸痹中滿皆相類中滿為氣虛胸痹為氣實氣分挾痰飲營衛不利腹滿脅鳴相逐氣轉膀胱營衛俱勞陽氣不通則身冷陰氣不通則骨疼陽前通則惡寒陰前通則痹不仁陰陽相得其氣乃行大氣一轉其氣乃散實則失氣虛則遺溺名曰氣分寸口遲而澀遲則氣不足澀則血不足氣寒涎結水飲所作婦人經水前斷後病名曰血分先病水後經斷名曰水分類別相似濕腫類多自正水之餘有風水皮水石水黃汗等入水門如脾氣橫泄腳氣皮滿膚脹腸覃石瘕氣分血分皆相似也類分䐜脹有胃中風脾中寒中濕心痹肝虛脾傷脾熱飲聚女疸小腹脹有腎熱三焦虛寒瘍癰女勞疸面腫肺中風腎中風胃寒肺水有論胕腫七證有肺氣隔於膜外運行不得遍身浮腫脈浮治宜調肺通氣有男臟虛女血虛傷於冷毒之物成積礙氣道不通腹急氣喘亦有四肢不腫只肚鼓脹脈弦治宜化積有脾寒久年不愈傳為浮腫且云內有伏熱因而瀉利及其熱乘虛入脾至胸腹急脹脈數治宜解熱有脾主肌肉肉如泥按之不起土濕病也脈沉治宜燥脾有脾虛不能制腎水脾濕如泥脈沉遲治宜緩脾元利水道有傷風濕而腫或傷冷濕而腫氣血凝澀脈浮緩治宜發散風濕也有久病氣虛面浮手足虛氣妄行者婦人産後或經事後有此一證是氣虛也治在調氣補血結陽者腫四肢夫熱勝則腫四肢為諸陽之本陽結於內不得行於陰熱邪則菀於四肢大便閉澀是熱也非水也宜服犀角玄參連翹升麻麥門冬木通芒硝有脅支滿或腹滿痛或胸脹亦有經氣聚而不行如脅支滿少陽經氣不行也余皆仿此有頭腫臂腫胸脹皆氣不順有餘於上有身腫而冷胸塞不能食病在骨節汗之安三十四嘔吐噦脈形狀如新臥起脈弱而嘔小便復利身有微熱見厥者死趺陽脈浮胃氣虛嘔而不食恐怖死寬緩生寒氣在上陰氣在下二氣並爭但出不入嘔家有癰膿者不可治膿儘自愈先嘔卻渴此為欲解先渴卻嘔為水停心下屬飲嘔本渴今反不渴有支飲嘔多雖有陽明證不可下蓋邪氣不在胃口脈數反吐汗令陽微膈氣空虛數為客熱不能消穀胃中虛冷故吐也陽緊陰數食已則吐陽浮而數亦然或浮大皆陽偏盛陰不能配之也為格主吐逆無陰故嘔寸口脈緊而芤緊為寒芤為虛虛寒相搏脈為陰結而遲其人則噎關上脈數則吐脈弦者虛也胃氣無餘朝食暮吐變為胃反寸緊尺澀胸滿不能食而吐吐止者為下之未止者為胃反也趺陽脈微而澀微則下利澀則吐逆谷不得入或浮而澀浮則虛虛傷脾脾傷則不磨朝食暮吐名胃反寸口脈微而數微則血虛血虛則胸中寒脈緊而澀者難治嘔吐思水者易解關上脈浮大風在胃中心中淡淡食欲嘔關上脈微浮積熱在胃中嘔吐蛔蟲關上脈緊而滑者蛔動脈緊而滑者吐逆脈小弱而澀胃反證嘔吐噦各有所辨吐屬太陽有物無聲乃血病也有食入則吐食已即吐食久則吐之別嘔屬陽明有物有聲氣血俱病噦屬少陽無物有聲乃氣病也治因胃口有熱膈上有痰故嘔吐亦有寒氣客於腸胃厥逆上出故痛而嘔因胃中虛膈上熱故噦亦有痰水滿塞而噦因胃氣虛陽火上衝故吃逆亦有痰熱在胃中氣不降而厄李論寒客胃中物盛上溢故嘔清厥甚則痹食而吐寒氣與新穀氣俱還於胃中新故相亂真邪相攻故噦三者雖殊皆因脾胃虛弱亦因寒氣客胃加之飲食所傷而致宜以丁藿二香半夏茯苓陳皮生薑之類主之又有痰飲者必下之又論皆氣衝之火逆胃之脈反上而作治宜降火厄者氣逆也陰火炎上也氣自臍下為火直衝上出於口而作聲也又火結痰氣而上升衝出於口也治宜降火行氣導痰而自安劉論吐有三氣積寒也上焦吐者皆從於氣氣者天之陽也脈浮而洪其證食已暴吐渴欲飲水大便燥結氣上衝胸而發痛治宜降氣和中中焦吐者皆從於積食與氣相假為積而痛脈浮而匿其證或先吐而後痛或先痛而後吐治法以毒藥行其積木香檳榔去其積下焦吐者從於寒也脈沉遲其證朝食暮吐暮食朝吐小便清利大便不通治法毒藥通其閉塞溫其寒氣也三因論有寒嘔熱嘔痰嘔食嘔血嘔氣嘔寒因胃寒傷食四肢厥冷脈弱宜四逆湯熱食入即出煩躁脈數柴胡湯痰昔肥今瘦腸間有聲食與飲並出宜半夏人參主之食嘔因胃虛寒氣在上暖氣在下朝食暮出不消養胃湯主之血因瘀蓄冷血聚於胃口因憂怒氣攻血隨食出宜茯苓湯主之氣胃者陽明合榮於足今隨氣上逆心膈脹嘔卻快宜茱參湯主之方論厄逆切忌熱藥丁香類病皆胃虛陰火所乘宜參術大補之類如痰實者察其病因形氣俱實以人參蘆吐之有傷寒差後嘔者當去餘熱有酒家嘔解酒治之有腳弱脾疼而嘔者此腳氣內攻依腳氣門治有中毒而嘔者解毒治之有懷孕惡阻者依惡阻治之有心中風心中寒肝中風中濕脾痹有漏氣有走哺女人患嘔吐甚者死其陰在上故也論皆屬於火嘔而心下痞半夏瀉心湯乾嘔而利者黃芩半夏湯嘔吐谷不得入小半夏湯嘔吐病在膈上豬苓湯食已即吐者大黃甘草湯胃反吐而渴茯苓澤瀉湯似嘔不嘔如噦不噦無奈薑汁半夏湯噦逆上氣者陳皮竹茹湯陳皮參草竹茹桔梗湯治上焦氣熱所沖食已暴吐脈浮而洪已下出劉桔梗白朮各一兩五錢半夏神麯二兩陳皮枳實炒茯苓厚朴制一兩水煎下木香檳榔末各一兩如大腑燥結加承氣湯荊黃湯治前證熱氣甚者荊芥穗一兩人參五錢大黃三錢甘草二錢五分調下木香檳榔末各二錢清鎮丸治前證頭痛有汗脈弦柴胡二兩黃芩七錢五分半夏甘草各五錢青黛二錢五分人參五分上薑汁浸炊餅丸梧子大食後薑湯下紫沉丸治中焦吐食積與寒氣相假故吐而痛半夏神麯烏梅去核代赭石縮砂各三錢杏仁去皮尖沉香木香各一錢陳皮半兩檳榔丁香各三錢白豆蔻五分白朮一錢巴霜五分另入上醋糊丸米大薑湯下五十丸木香白朮散治前證腹中痛是脾實系強宜和之木香八兩白朮半兩半夏神麯一兩檳榔二錢五分茯苓半兩甘草四錢上濃煎芍藥薑湯下二錢有積而痛手不可按無積者宜之附子丸治下焦朝食暮吐暮食朝吐大便不通附子炮五錢巴豆霜一錢砒五分另研上黃蠟丸如梧子大每二丸冷水下利為度更服紫沉丸不令再閉安胃散李先生治嘔吐噦以胃寒所致丁香五分茱萸草蔻人參各一錢炙甘草五分黃耆一錢柴胡五分升麻七分黃柏三錢陳皮五分當歸一錢五分蒼朮一錢半夏茯苓陳皮末三味治嘔吐痰涎痰飲為患加之寒則否煎稍熱服祕方治痰嘔吐二陳湯山梔炒黃連薑汁炒香附虛加蒼朮厄逆因寒則可用此世俗之劫亦可戒丁香柿蒂各一錢竹茹煎熱服有噁心吐蟲數條後乃頻作服殺蟲藥則吐蟲愈多六脈皆細非蟲脈也乃臟寒而不安矣有嘔飲食皆不得進治嘔愈嘔此胃風也論吐有三證冷吐先覺咽酸嘔然後吐食脈小滑者是王叔和云關胃寒不下食傷寒汗下過多胃中虛冷食久反吐亦屬於寒胃熱而吐者聞穀氣則嘔藥下則吐或傷寒未解胸中有熱關脈洪宜涼之胸中有宿食或痰飲或停水關沉而伏者宜吐之三因論嘔吐出於胃故有寒熱食痰血氣同上條論嘔逆則咳逆也大率胃實則噫胃虛則噦此因胃中虛膈上熱也故噦至八九聲相連收氣不回驚人者若傷寒久病得此甚惡內經所謂壞腑是也亦有噦而心下堅痞眩悸者以膈間有痰水非虛危比也痰半夏湯主之噦虛橘皮竹茹湯主之論漏氣病者身背皆熱肘臂牽痛其氣不續膈間厭食食則先吐而後下名曰漏氣此由上焦傷風開其腠理經氣失道邪氣內著麥門冬湯主之麥門冬生蘆根竹茹人參茯苓白朮甘草陳皮葳蕤薑亦可論走哺病者上焦實熱大小便不通氣逆不續嘔逆不禁名曰走哺人參湯主之前方加黃芩知母石膏山梔去竹茹麥冬三十五噎膈脈澀小血不足大而弱氣不足因血虛血陰血也主靜內外兩靜火則不能生焉臟腑之火起氣虛氣肺金生水制火則不起臟腑之火熾而或因金水二氣不養或陰血不生腸胃津涸傳化失宜或因痰膈妨礙升降氣不交通皆食入復出謂之膈噎即翻胃也噎病也大概因血液俱耗胃脘亦稿在上近咽之下水飲可行食物難入間或可食入亦不多名之曰噎其稿在下與胃為近食雖可入難盡入胃良久復出名之曰膈亦名翻胃大便祕少如羊矢名雖不同病本一也張論三陽結謂之膈三陽大腸小腸膀胱也結者結熱也小腸結熱則血脈燥大腸結熱則後不通膀胱結熱則津液涸三陽既結則前後閉則反而上行此所以噎食不下縱下而復出也宜先潤養因而治下或涎痰上阻用苦酸微微湧之證三因有五噎氣噎者心悸上下不通噫噦不徹胸背痛憂噎者遇天陰寒手足厥冷不能自溫勞噎者氣上膈脅下支滿胸中填塞故背痛思噎者心怔悸喜忘目視䀮䀮食噎者食無多少胸中苦塞痛不得喘息五膈憂膈者胸中氣結津液不通飲食不下羸瘦短氣思膈者中脘食滿噫則酸心飲食不消大便不利怒膈者胸膈逆滿噎塞不通嘔則筋急惡聞食臭喜膈者五心煩熱口舌生瘡四肢倦重身常發熱胸痛引背食少恐膈者心腹脹滿咳嗽氣逆腹中苦冷雷鳴繞痛不能食治法宜以潤養津血降火散結萬藥萬全有人血耗便如羊矢病反胃半年脈澀而不勻不大便八九日先以甘蔗汁煎六君子湯加附子大黃與之伺便潤令以牛乳服之方四物湯加陳皮去白紅花酒浸驢尿防其成蟲祕方治膈噎童便牛羊乳韭汁竹瀝甘蔗汁解酒毒氣虛加四君血虛加四物胡荽丹治反胃氣烏雞一隻令淨胡荽子入雞縫之煮熟食之漸盡不得再一隻雞妙也三十六瘡瘍脈沉實發熱煩躁外無焮火赤痛其邪深在內故先疏通以絶其源脈浮大數焮腫在外當先托裡恐邪入於內脈不沉不浮內外證無知其在經當和營衛浮者太陽長者陽明弦者少陽浮者在表宜行經沉者在裡宜疏利臟腑緩者身重除濕緩者濕勝故重脈大心躁乍熱大者心肺有熱脈弦眩暈有風肝脈澀者氣滯乏津瀉氣補血澀者血虛脈弦細便溺多溺寒水脈細為膀胱之寒水因火之屬濕熱相搏肌肉敗壞而為膿營氣不從逆於肉裡乃生癰腫營氣運氣也逆而不行其源在經濕氣外傷害人皮肉皆營氣之不行也其源在外盛則內行膏粱之變足生大疔皆營氣逆行凝於經絡其源在裡發於表也證瘡瘍諸症皆營氣盛偏助火邪而作隨虛而出於經絡也如太陽經虛從背而出少陽虛從須而出陽明虛從髭而出腎脈虛從腦而出微熱則癢熱甚則痛血虛則痛甚熱甚則腫甚治法外者宜以辛涼發散之通聖涼膈解毒是也內者宜以苦寒下之三黃湯玉燭散是也中者宜以調經涼血等是也腫瘍宜解毒下之是也潰瘍宜托裡補之是也如溫經加通經之藥妙矣夫邪氣內蓄腫熱宜砭射之也氣勝血聚者宜石而泄之如腫瘍年壯謂伏熱在心可降其火如潰瘍年老發嘔不食謂虛大補病瘡腰脊瘛瘲者死內疏黃連湯治嘔啘啘發熱脈沉而實腫硬色不變根深臟腑祕澀黃連芍藥當歸木香檳榔黃芩山梔薄荷甘草桔梗各一兩連翹二兩大黃便祕加之行經黃芩黃連連翹人參木香檳榔柏澤瀉在腰以上至頭者枳殼疏利臟腑用前藥中加大黃痛者當歸黃耆止之傷煎散治腫焮於外根盤不深脈浮邪氣盛則必侵於內宜熱之地骨皮黃耆白芍黃芩白朮茯苓人參當歸肉桂甘草防己各一兩防風二兩上以蒼朮一升水五升煎至半去渣入藥煎服便祕加大黃熱加黃連黃連消毒湯治一切瘡疽背腦黃連一錢黃芩黃柏地黃知母各四錢羌活獨活防風藁本歸尾桔梗連翹各四錢黃耆人參甘草各三錢蘇木二錢防己五錢澤瀉二錢遠志酒忍冬酒不問腫潰皆有奏捷之功然二酒有補性歸心歸血之效金銀花湯治痛色變紫黑者回瘡金銀花並枝甘草各二兩黃耆四兩酒一升閉口重湯煮酒煮皆可乳香散治痛瘡口大寒水石煅滑石各一兩乳香沒藥五錢腦子少許末糝口上雄黃散治惡肉不去雄黃一錢巴豆一個去皮尖乳香沒藥少許另研細和勻敷肉上木香散治久不收口木香檳榔當歸各一錢黃連二錢為末糝之出剩骨血竭罨之骨自出治漏瘡剩骨青橘葉地錦草上二件杵成膏先淨瘡口用杜牛膝根內入瘡中以膏敷之縛定一上散治瘡疥癬雄黃另硫黃另各五錢斑蝥三個去翅足另黑狗脊另寒水石蛇床子炒各五錢上細末同勻油調擦上加法隨病金絲其狀如繩線巨細不一上下行至心即死可於瘡頭上截經刺之出血後嚼萍草根塗之立安治疔瘡劉先生方烏頭尖附子底蠍梢雄黃各一錢蜈蚣一兩硇砂粉霜輕粉麝香乳香各五分信石二錢五分上末先破瘡口出血亟以草杖頭用紙滯於內以深為妙疔瘡毒氣入腹昏悶不食紫花地丁蟬蛻貫衆各半兩丁香乳香溫酒下二錢治疔瘡李先生方歸尾沒藥白芨乳香杏仁黃丹萆麻粉霜巴豆木鱉子芝麻油桃柳枝上煎如法白菊花紫莖者汁服渣敷之茜草根葉亦可疔瘡先癢後痛先寒後熱熱定則寒四肢沉重頭痛心驚眼花嘔逆則難治貼杖瘡虎骨黃柏黃連黃芩苦參以五味煎入油紙煎又數沸次以紙貼上惡瘡霜後凋蕉葉乾末敷香油調油紙掩先用忍冬藤蔥椒金絲草洗松上白蟻泥黃丹炒黑香油調敷外用油紙夾上日換後用龍骨末藥於口上收肉黃丹入香油煎入朴硝抹瘡上口瘡神方焰硝硼砂含口不開以南星於湧泉醋敷之飲酒人口糜導赤散五苓散風寒遏絶陽氣不伸聲不出半夏制一兩烏頭肉桂各一錢煎服赤口瘡白礬飛沒藥乳香銅緑末糝白口瘡雄黃沒藥各一錢輕粉五分巴豆末糝唇緊燥裂生瘡用青皮燒灰豬脂調敷夜臥頭垢亦可口痛瘡五味子一兩黃柏蜜炙滑石各五錢銅緑加糝白薔薇汁漱之良有口瘡不下食衆以狐惑治之必死未若以礬湯於腳上浸半日頓寬以黃柏蜜炙殭蠶灼末敷立下乳而安一方神效西瓜外皮燒灰黃柏黃連硃砂孩兒茶硼砂為末水調抹效手癡瘡皂角枯礬輕粉黃連黃柏沙瘡柵地藤燒灰足上毒瘡密陀僧黃連敷之有法旱蓮草鹽炒桑白皮打細作餅蓋干易之杜牛膝無名異金星草俱可治腳五倍子研牛腳髓同調厚朴治陰瘡臘茶五倍子等分膩粉少許孩兒茶妙又方降真香磨水抹效三十七癰疽脈數身無熱內有癰也脈數必當發熱而反惡寒若有痛處當發其癰脈數而虛咳唾涎沫為肺痿脈數而實或滑咳則胸中隱痛為肺癰脈緊而數膿為未成緊去但數膿為已成脈滑而數小腹堅滿小便或澀或汗或寒為腸癰設脈遲緊聚為瘀血下血則愈設脈洪數膿為已成腸癰脈滑為實數為熱衛數下降營滑上升營衛相干血為敗濁皆濕熱之所為也死之地分伏兔腓腨背臟俞項上腦髭鬢頤因火之毒氣結之毒從虛而出也薄處先穿之義師全用補蓋厚味之火氣鬱之結壅滯經絡或引痰飲血為之滯氣為之亂積久從虛而出其經也夫陰滯於陽則癰陽滯於陰則疽氣得淤而鬱津液稠黏為痰為飲而久滲入肺血為之濁此陰滯於陽也血得邪而鬱隧道阻隔積久結痰滲出脈外氣為之亂此陽滯於陰也肺痿熱在上焦肺癰乃風傷於衛熱過於營血為凝滯蓄結成癰囊癰乃濕熱下注也有作膿者此濁氣順下將流入滲道因陰氣虧水道不利而然膿盡乃安骨疽因厚味及酒後涉水得寒故熱邪深入髀樞穴左右積痰老血相搏而成也內疽因飲食之火七情之火相鬱而發在腔子而向里非於腸胃肓膜也以其視之不見故名之曰內證肺痿病多涎唾小便反難而數大便如豚腦欲咳不咳咳出干沫唾中出血上氣喘滿或燥而渴者寸口脈數而虛按之澀肺癰病咳逆上氣濁吐出如粥膿血胸中隱痛又咳膿血口燥或喘滿不渴唾沫腥臭時時振寒寸口脈數而實按之滑腸癰病小腹重強按則痛堅滿如腫小便數似淋或澀或自汗復惡寒又身甲錯腹皮急按之濡如腫狀腹如聚積按之痛如淋小便自調甚則腹脹大轉側聞水聲或繞臍生瘡或膿從臍出背癰脈數身無熱而反惡寒若有背痛處發其癰附骨疽與白虎飛尸歷節皆相似歷節走注不定白虎飛尸痛淺按之便減亦能作膿附骨疽著骨而生痛深按之無益治法宜補氣血瀉火散氣初覺可清熱拔毒已潰則拔毒補氣用分經絡氣血多少可補可驅毒如少陽分少血多氣宜補千金內托散內托之名使氣充實則膿如推出也羌活獨活藁本各一錢五分防風身梢歸梢各五分歸身四錢連翹三錢黃芩酒炒黃耆人參甘草各一錢半生用五分陳皮蘇木五味各五分黃柏酒炒知母酒炒生地酒製黃連酒製各一錢五分漢防己酒製桔梗各五分山梔二錢豬苓二錢去皮麥冬二錢去心大黃酒製三錢作兩服煎驗方有婦人年七十性好酒形實性急腦生疽脈緊急切之澀錦紋大黃酒炒人參酒熟每一錢薑汁煎服驗方有人年五十形實色黑背生紅腫近骨下痛甚脈浮數而洪緊食亦大嘔時冬月麻黃桂枝冬月用之生附脈緊用之黃柏酒炒栝蔞甘草節羌活青皮半夏人參黃耆薑煎驗方治初生一切瘡癤癰疽發背服之殊效亦能下死血大黃甘草辰砂血竭酒下解毒丹治一切發背癰疽金石毒紫背車螯大者鹽泥固濟煅紅出火毒甘草膏丸甘草湯下惡物用寒水石煅紅入翁沉井中臘豬油調敷又方以輕粉為佐又以燈草為佐散腫消毒輕者可杖清涼膏治發背當歸白芷木鱉肉白芨白蘞各一兩乳香研膩粉少許白膠少許黃丹五兩麻黃七兩上煎前六味候紫色去之入槐柳枝各七寸再煎入丹臨時入下三生散治漫腫光色附骨癰如神露蜂房蟬蛻頭髮各等分燒灰存性三錢研細酒下曾用五灰膏敷一宿待惡肉腐以刀去之盡以香油蘸在錦上紐干復之待好肉如岩合簠狀方可以收口用龍骨白蘞乳沒等藥敷之內疽用四物湯加減服之有人性急味厚在脅下一點痛每服熱燥之藥脈輕則弦重則芤知其痛處有膿因作內疽病治之甘草乾薑人參治肺痿甘草四兩乾薑二兩人參一兩大棗三個煎服小青龍湯治肺癰先解表之邪也此治腫瘍之法也葶藶大棗瀉肺湯治癰疽喘不得臥也葶藶炒黃研丸彈子大水三升入棗先煎二升去棗入葶藶煎至一升頓服之先進小青龍湯三服後進此桔梗湯治咳胸滿唾如米粥當吐膿血甘草桔梗各一兩葦莖湯治咳有微熱胸中甲錯此治潰瘍之法也葦莖二升切瓜瓣仁薏苡仁各半斤桃仁五十個去皮尖煎服又方栝蔞連瓤下煎薏苡附子敗醬散治腸癰身甲錯腹皮急脹本無積聚身無熱脈數者附子炮敗醬各二錢薏苡仁十個水煎大黃牡丹湯治腸癰小腹或偏在膀胱左右大如掌熱小便自調時自汗脈遲緊未成膿可下之膿成不可下大黃四兩牡丹皮三兩芒硝二兩瓜子一個桃仁五十個水煎頓服雲母膏有如腹痛百分不治脈滑數腹微急脈當沉細今脈滑數以雲母膏下之雲母膏丸梧子大一百丸阿膠煬入酒下之下膿血為度可止青皮當歸湯李先生方治便癰青皮防風當歸甘草梢空心煎服桃仁承氣湯張先生方治便癰驗便毒方葫蘆巴末服川楝灰亦好附骨疽方青皮黃柏桂枝冬加黃芩夏加牛膝虛加甘草薑汁麻黃發不動加又防風通聖去硝黃入生犀角浮萍末治骨疽癭狀多著肩背如堅硬不可移名石癭皮色不變名肉癭如筋脈露結名筋癭赤脈交錯名血癭隨憂愁消長名氣癭瘤狀隨氣凝結有骨筋肉膿血之瘤

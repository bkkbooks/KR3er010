body:
  text: 卷四三十八乳癰證乳房為陽明所經乳頭為厥陰所屬因厚味濕熱之痰停蓄膈間與滯乳相搏而成滯乳因兒口氣吹噓而成有怒氣激其滯乳而成凡病皆陽明經也淺者為癰深者為岩不治治宜疏厥陰之滯清陽明之熱行汙血散腫結方煅石膏清陽明橘皮栝蔞子消腫甘草節行血蜂房臺芎香附二味鬱氣加之青皮疏厥陰葛根酒薑汁飲又方大黃天花粉當歸一兩甘草節已下一錢五分栝蔞子穿山甲陳壁土炒酒丸服三十九瘰因大抵食味之過鬱氣之積曰毒曰風曰熱皆此三端變化引換須分虛實實者易治虛者可慮夫初發於少陽一經不守禁戒延及陽明蓋膽經至主決斷有相火而且氣多血少神效方牡蠣粉五錢和雞膽為膏貼之又用活石一兩肉桂五錢調湯服之好證外有蝦蟆瘰無核但腫瘰在陽明少陽經結核按之走痛癭或隱僻處勞瘵結核連數個在耳邊或聚或散也瘤等亦同治宜瀉火散結虛則補元氣實則瀉陰火補則十全散下則玉燭散化堅湯升麻一錢葛根五分漏蘆足陽明牡丹皮三錢去留血當歸地黃生熟各三錢連翹一錢生血脈黃耆一錢護皮白芍收散三錢肉桂散結寒因熱用三錢柴胡八錢黍黏消腫羌活一錢防風獨活各五分散結昆布軟堅三稜削堅廣朮人參厚朴腹脹加黃連陳皮木香氣不順加大黃便祕加大黃湯大黃煨皂角甘草炙煎服以麝香栝蔞仁敷之法未破核者用火針針其上即用追毒膏點苧線頭內針孔中又用杜牛膝搗敷縛其上一日一易如膿將盡又用生玄參地榆滑石寒水石大黃等末敷縛其瘡又用白厄菜墨草同縛其瘡以寒水石大黃硝龍骨木香檳榔末收口後又用竹茹亦能長肉白膏藥收後紅不退用北蠮螉窠敷如已潰久不收口須用香附燈燒鐵烙烙其腐處盡後依前治之治耳接耳邊項上生塊核是方五味子香白芷為末蜜調敷豭鼠糞以黃泥爐煅去瘰癧毒皂角子五兩大黑豆一斤甘草一兩冬青葉汁一斤上煮汁干為度常食不過兩料四十發斑因治屬表者因風挾熱痰通經微汗之下之亦可屬裡者因胃熱助手少陰心火入於手太陰肺也故紅點如斑生於皮毛之間耳白虎瀉心調胃承氣從長而用之四十一丹疹因熱與痰血熱也夫斑痘疹丹皆惡毒血熱蘊蓄於命門遇相火合起則發也外有赤遊風天蛇漠丹疹癮斑其狀不同因則一也治張歸之少陽相火如遇熱之時以通經辛涼解之如在寒之時以葛根升麻辛溫解之如遇瘡癰黑陷腹內喘滿者熱而氣虛也急以白虎解之熱加參參主喘也主之全以涼膈調之消毒湯升麻根羌活藁本細辛柴胡葛根黃芩酒炒生地黃黃連黃柏連翹紅花當歸蘇木白朮蒼朮陳皮吳茱萸防風甘草又方紫草紅花子白芍胡荽當歸附方剪刀草汁調原蠶砂敷之龍腦丸治斑瘡倒靨豬心血調腦子成膏以紫茸湯化無腦用辰砂四十二金瘡附油火刀犬等傷脈金瘡出血太多脈沉細者生浮數實大者死治沒藥散治刀箭傷止血住痛定粉風化灰各一兩枯白礬三錢乳香五分另研沒藥一字即二分半也一銅錢有四字之故另研和勻糝之聖愈湯治出血太多四物湯人參黃耆煎服金瘡刀傷見血方降真香末細貼之石灰和人血作餅旋干貼之煨大黃石膏細研桐油二分水一分拌抹上又淹灰搽敷亦良救苦散治熱油刀斧傷火傷犬咬傷寒水石油調塗上四十三傾僕脈傾僕內有血腹脹滿脈堅強者生小弱者死證瘀血為病或痰涎發於上治同中風證惡血歸內留於肝經脅痛自汗治宜破血行經張論墜墮使生心恙痰涎發於上也治宜補之凡杖打閃肭疼痛皆血滯證可下之忍痛則傷血神應散治瘀血大便不通大黃酒浸一兩桃仁紅花二錢當歸三錢栝蔞根二錢炮穿山甲二錢柴胡引經麝香透熱酒下紫金丹治骨節折傷疼痛炮川烏炮草烏各一兩五靈五錢木鱉子去殼黑牽牛各五錢威靈仙金毛狗脊骨碎補沒藥麝香紅娘子各二錢五分地龍烏藥青皮陳皮茴香各五分防風自然銅四兩燒淬禹餘糧四兩淬醋糊丸梧子大每十丸酒下三聖散吐之治痰壅四十四百藥中傷脈浮澀而疾者生微細者死洪大而遲者亦生治法在上吐之解毒丸治食毒物救人於必死干板藍根四兩貫仲一兩去土青黛甘草蜜丸青黛良祕傳方續隨子甘草五味子茶清下一二碗四十五癲狂脈大堅疾者癲病脈大滑者自已脈小急實者死循衣縫者死虛而弦急者死脈虛弦為驚脈沉數為痰熱因痰火驚血氣者身之神也神既衰乏邪因而入夫血氣俱虛痰客中焦妨礙不得運用以致十二官各失其職神聽言動皆有虛妄宜吐之而安肺入火為譫語肺主諸氣為氣所鼓舞火傳於肺為之尋衣撮空胃中大實熱熏於心肺亦能譫語宜降火之藥驚其神血不得寧也痰積鬱熱隨動而迷亂心神無主有似邪鬼可先吐之後以安神丸主之佐以平肝之藥膽主驚故也證狂言譫語鄭聲辨狂者開目與人語語所未嘗見之事為狂也譫語者合目自言日用常行之事為譫也鄭聲者身動無力不相接續造語出於喉中為鄭聲也又蓄血證則重復語之治痰者吐之三聖散火者下之承氣湯驚者平之安神丸方總治黃連辰砂二味降火栝蔞南星半夏三味行痰青黛柴胡川芎三味平肝桃仁承氣湯治熱入血室發狂犀角地黃湯治瘀血狂妄因汗不徹吐衄不盡瘀血在內面黃唇白便黑腳弱氣喘甚則狂悶犀角一兩生地八兩白芍三兩丹皮大黃二兩脈大遲腹不滿為無熱減之煎服洪長伏三脈諸癇發狂以局方妙香丸以針透眼子冷水浸服之弦細緩三脈並癇李和尚五生丸治癇方黃丹白礬等分研細用楊樹火煅過曲丸又方川芎二兩防風一兩皂角鬱金各一兩明礬一兩黃赤腳蜈蚣各一條細末蒸餅丸梧子大空心茶清下十五丸四十六驚悸脈寸口脈動而弱動為驚弱為悸趺陽脈微而浮浮為胃氣虛微則不能食此恐懼之脈憂迫所作也寸口脈緊趺陽脈浮胃氣則虛是以悸肝脈鶩暴有所驚駭證悸有三驚悸忪悸痰飲閉於中脘其證短氣自汗四肢浮腫飲食無味心虛煩悶坐臥不安悸心築然而動治因血虛肝主血無血養則木盛故易驚心神忤亂氣與涎結遂使驚悸血虛治宜硃砂安神丸氣涎相結宜溫膽湯在心膽經小兒驚搐涎潮如死乃母胎時受怖為腹中積熱可墜其涎鎮火清心等是也悸因失志氣鬱涎聚在心脾經治宜定志丸失志者或事不如意久思所愛少陰心悸乃邪入於腎水乘心唯腎欺心火懼水也治在於水以茯苓導其濕四逆散調之枳實柴胡芍藥甘草是也與驚悸不同名亦謂之悸故書以別之發搐痰飲為證脈必弦澀皆用下之外有肝痹心肺瘧言虛寒皆驚硃砂安神丸治血虛驚悸硃砂一兩另研黃連一錢二分當歸五分甘草五分生地三錢炊餅丸溫膽湯治心膽性易驚半夏竹茹枳實二兩茯苓一兩五錢陳皮三兩甘草一兩寒水石散治因驚心氣不行鬱而生痰結為飲寒水石煅滑石水飛各一兩甘草一兩龍腦少許熱則水下寒姜下四十七疝㿗脈寸口弦緊為寒疝弦則衛氣不行衛氣不行則惡寒緊則不欲食寸口遲緩遲則為寒緩為氣之虛虛寒相搏而痛脈沉緊豁大者為虛脈滑為疝急為疝搏為疝見於何部而知其何臟因證蓋全在肝經因濕熱在經抑遏至久又感外寒濕被鬱而作痛或大勞則火起於筋醉飽則火起於胃房則火起於腎大怒則火起於本經火鬱之甚濕熱便盛濁液凝聚併入血隧流於肝經為寒所束宜其痛甚因痰飲積流入厥陰聚結成核因瘀結其本經因虛而感或內火外寒鬱之肝經與沖任督所會聚於陰器傷於寒則陰縮入傷於熱縱挺不收屬木性速急火性暴而痛亦暴矣張論七疝寒疝因濕地雨水風冷處使內過多其狀囊結硬如石陰莖不舉或控睪丸而痛宜以溫劑下之久而無子水疝因醉過內汗出遇風濕之氣聚於囊中其狀腎囊腫痛如水晶或癢搔出黃水小腹或按之作水聲陰汗治宜逐水筋疝因房勞及邪術所使陰莖腫或潰膿或痛而裡急筋速縮或挺不收或白物如精或莖痛之極則癢宜降火下之血疝因使內氣血流溢滲入脬囊留而不去結成癰膿多血狀如黃瓜在小腹兩旁橫骨約中俗云便癰治宜和血氣疝因號哭忿怒氣鬱而脹哭怒罷則散其狀上連腎區下及陰囊宜以散氣藥下之小兒有此因父精怯故不治狐疝與氣疝大同小異狀如仰瓦臥則入小腹行之則出入囊中宜逐氣流經之劑下之㿗疝因地卑濕江淮間所生其狀如升鬥不癢不痛宜去濕之藥下之女子陰戶突出雖相類乃熱不禁固也三因有四㿗腸㿗因房室過度元臟虛冷腸邊膋系不收墜入㿗中上下無定此難治氣㿗因七情臟氣下墜陰㿗腫脹急痛易治水㿗因濕氣得之則腫脹其陰易治之卵㿗因勞役坐馬致卵核腫脹或偏有大小上下無常此難治也外有婦人陰門挺出亦名㿗病丁香楝實丸已下出李當歸酒製去蘆炮附川楝茴香以上各一兩銼好酒三升同煮酒盡焙乾作末入下藥丁香木香各五分全蠍十三個玄胡索五錢上同為末酒糊丸梧子大每服三十丸至百丸溫酒下參朮湯治虛疝脈豁大者是人參白朮山梔香附倉卒散治寒疝入腹卒痛小腸膀胱氣絞腹冷重如石出白汗山梔四十九個燒半過生附子酒煎二錢又一方烏代附神應散治諸疝心腹絞痛不忍此方能散氣開結玄胡索胡椒或加茴香酒煎二錢牡丹丸治寒疝心腹刺痛及血川烏炮去皮尖牡丹皮四兩桃仁炒去皮尖桂各五兩青皮一兩蜜丸酒下桃仁湯治㿗疝大桃仁如法茱萸桂枝蒺藜青皮白茯苓檳榔木香海藻三稜莪朮任意加減張用導水禹功豬腎通經等散下之祕方治諸疝枳實治痛山梔茱萸橘子山楂去核積桃仁瘀血加之川烏劫痛同梔桂枝不定必用荔枝核濕則加之青皮守丸治㿗要藥不痛蒼朮南星半夏白芷散水川芎枳實山楂應痛丸治敗精惡物不出結成疝痛不忍阿魏二兩醋和蕎麥麵裹火煨熟檳榔大者二個刮空滴乳香滿盛將刮下末用蕎麥拌作餅慢火煨上細末入硇砂一錢赤芍一兩同為末麵糊搜和丸如梧子大鹽酒下雄黃散治陰腫大如斗核痛不治雄黃一兩明礬五錢甘草五錢煎洗又方天蘿筋燒灰治疝妙四十八腳氣脈浮弦者風濡弱者濕洪數者熱遲澀者寒微滑者虛牢堅者實結則因氣緊則因怒細則因悲入心則恍惚妄謬嘔吐食不入眠不安左寸脈乍大乍小者死入腎則腰腳俱腫小便不通呻吟目額皆黑沖胸而喘左尺脈絶者死因濕之病南方之人自外而感北方之人自內而致南方之人當風取涼醉房久坐濕地或履風濕毒氣血氣虛弱邪氣並行虛腠邪氣盛正氣少故血氣澀澀則脾虛虛則弱病發熱四肢痠痛煩悶者因暑月冷濕得之四肢結持弱者因寒月冷濕得之北方之人因湩酪醇酒之濕熱下注積久而成腫滿瘀痛也治宜下藥泄越其邪證治因病脛腫小腹不仁頭痛煩心痰壅吐逆時寒熱便泄不通甚至攻心而勢迫治之不可後也此壅之痰壅未成當宜通之調以黃柏蒼朮類壅既成當砭惡血而後以藥治之攻心腳氣乃血虛而有濕熱也治宜四物加柏筋動轉而痛者乃血受實熱也治加桃仁芩連有痰流注加竹瀝薑汁南星是也李曰濕淫所勝治以苦溫以苦辛發之透關節勝濕為佐以苦寒泄之流濕清熱為臣故主當歸拈痛湯一方治之中腳膝論自內喜怒憂思寒熱邪毒之氣注於腳膝狀類諸風謂之腳氣也自外風寒暑濕皆有不正之氣中於腳膝謂之腳氣也實者利之虛者益之六淫隨六法以治之七情隨六氣以散之三因論乃風寒暑毒氣襲之也風則脈浮寒則脈緊濕則脈細表則脈浮里則脈沉寒則痛濕則重暑則煩風則行隨其所中經絡而治之太陽經則頭項腰脊背痛六淫中之論同前宜以麻黃左金湯麻黃乾葛細辛白朮茯苓防風防己羌活桂枝甘草陽明則寒熱呻缺鼻乾腹脹膝臏賽中腹外皆痛六淫亦然宜大黃左金湯大黃細辛茯苓防風防己羌活黃芩前胡枳殼厚朴杏仁少陽則口苦脅痛面垢體無膏澤頭目頷鋭痛六淫亦同宜半夏左金湯半夏乾葛細辛白朮茯苓桂枝柴胡麥冬三陽合病寒熱關節重痛手足拘攣冷痹上氣嘔吐下利脈必浮弦緊數合前三方以發之太陰腹滿咽連舌急胸膈痞滿骨節煩疼四肢拘急浮腫宜六物附湯炮附桂枝各四兩甘草二兩茯苓三兩防己四兩白朮三兩少陰上氣喘急小腹不仁腰脊足心腨膕皆痛六淫亦然宜八味丸主之牡丹皮澤瀉茯苓桂枝香附山藥山茱萸熟地黃厥陰脅腰偏疼陰器抵小腹夾臍諸處脹痛一如中風宜神應養真丹當歸天麻川芎羌活木瓜熟地芍藥三因元並臟腑不同故也當歸拈痛湯治濕熱肢節煩痛肩背沉重胸膈不利身痛胻腫羌活炙甘草黃芩酒炒茵陳葉酒炒當歸各五錢人參苦參酒洗升麻葛根蒼朮各二錢知母酒洗防風澤瀉各三錢豬苓白冬朮各五分煎服羌活導滯湯治前證便溺阻隔先以藥導之服前方及此方羌活獨活各五錢防己三錢大黃酒煨一兩當歸三錢麩炒枳實三錢除濕丹治諸濕檳榔甘遂赤芍威靈仙葶藶澤瀉各一兩乳香另研沒藥各五錢黑醜炒三錢大戟一兩半炒陳皮二兩腳氣方治濕熱生地黃柏酒炒蒼朮鹽酒炒白朮川芎防己檳榔犀角甘草木通黃連黃芩二味熱加之竹瀝薑汁二味痰加之石膏熱時加桃仁便實加牛膝溺澀加食積流注方蒼朮黃柏防己南星川芎白芷犀角檳榔龜板血虛加血積轉筋方見論治攻心腳氣阮氏方治膝痛腳骨熱或赤腫行步難蒼朮四兩泔浸一日夜鹽炒黃柏四兩酒浸一日夜炙焦㕮咀服四十九蟲附狐惑脈匿蟲蝕陰肛脈虛小者生急緊者死因證濕熱之生臟腑虛則侵蝕腹內熱腸胃虛蟲行求食上唇有瘡曰惑蟲食其臟下有瘡曰狐蟲蝕其肛亦有口瘡非狐惑也治集效方木香鶴蝨炒檳榔訶子煨蕪荑炒炮附乾薑各七錢大黃一兩五錢烏梅或加連柏上蜜丸陳皮湯醋湯任下化蟲丸治蟲即化水硫黃一兩木香五錢密陀僧三錢炮附一個上先附末醋一升熬膏入藥和丸緑豆大荊芥茶清下二十丸祕方治吐蟲黑錫炒成灰檳榔末茶飲下又方川椒酒糊丸治蟲又方炒雞子白蠟塵治寸白蟲酒糊丸妙瀉心湯治惑苦參湯洗之治狐五十喉痹因熱內結雖有蛾閉木舌纏喉走馬之名火則一也論咽與喉會厭與舌同在一門而用各異喉以候氣故通於天咽以納食故通於地會厭管乎其上以司開闔掩其咽其食下不掩之其喉錯必舌抵上齶則會厭能閉其咽矣四者相交為用缺一則飲食廢而死矣及其為病皆火也夫手少陰君火心主之脈手少陽相火三焦之脈二火皆主脈並絡於喉氣熱則內結結甚則腫脹腫脹甚則痹甚痹甚則不通而死矣至如嗌乾痛咽頷腫舌本強皆君火之為也唯喉痹急速相火之為也證咽咽物之處咽腫則不能咽或嘔吐咯傷或多飲啖痰熱皆至咽系乾枯也喉聲音出入之處臟熱則腫其發暴腫閉塞或心虛寒有懸癰生在上齶俗名鵝也咳而聲嘶喉破俗名聲散也治法微以咸軟之甚以辛散之痰結以苦吐之否則砭出血人火以涼治之龍火以火逐之涼劑以熱服之是也宜刺少商出血祕方朴硝牙硝各研青魚膽上以膽放二硝上干方研為末竹管吹入喉中痰出即愈五匙散治風熱喉痹及纏喉風朴硝一兩五錢硼砂五錢腦子三錢殭蠶以竹管吹末入喉中神效散治熱腫語聲不出荊芥穗萆麻生去皮另研各一兩蜜丸皂角子大嚼含化雄黃解毒丸治纏喉風及喉痹倒僕失音牙關緊急不省人事雄黃一錢飛鬱金一錢巴豆去皮油十四個醋糊丸緑豆大熱茶清下一丸吐則止蜜附子治腑寒咽門閉不能咽大附去皮臍切大片蜜塗炙黃含咽津又方龍膽礬包烏梅肉內以綿裹含龍火拔毒散治纏喉急證先以針出血為上策緩以丹敷陽起石煅伏龍肝各三錢新水掃之又方白瑞香花根研水灌之祕方治痰其證皆因痰也以鵝毛刷桐油探吐之皂莢灰亦可吐殭蠶研姜服亦可生艾汁亦可五十一口因證脾熱則甘膽熱則苦口苦亦有肝虛寒者治三黃丸治甘柴胡湯治口苦及謀慮不決柴胡湯加麥冬棗仁地骨皮遠志五十二舌脈心脈系舌根脾脈系舌旁肝脈腎脈絡舌本因證因風寒所中則舌捲縮而不言七情所郁則舌腫滿不得息肝壅則血上湧心熱則裂而瘡脾熱則滑苔是虛熱心經飛揚上竄脾閉則白苔如雪脾熱則舌強舌卷而卵縮者厥陰絶也死治金沸草散治風寒傷心脾令人寒熱齒浮舌腫金沸草荊芥四兩前胡麻黃各三兩甘草半夏一兩升麻柴胡湯治心脾虛熱上攻舌上生瘡舌本強兩頰腫痛升麻柴胡白芍梔子木通一兩杏子大青黃芩三錢煅石膏二兩舌腫破鍋底煤即鍋底煙醋鹽敷出血如泉白膠香五倍子牡蠣末糝白胎語澀薄荷汁白蜜薑片揩敷之五十三目因風熱血少經曰目得血而能視肝血不上榮也神勞目者神氣之主勞則魂魄散不能相得腎虛水精不上奉也證治在腑則為表當除風散熱在臟則為里宜養血安神如暴失明昏澀翳膜眵淚斑入眼皆表也風熱也宜發散以去之如昏弱不欲視物內障見黑花瞳散皆里也血少神勞腎虛也宜養血補水安神以調之斑入眼此肝氣盛而發在表瞳子散大皆辛熱之為也辛主散熱乘之當除風熱涼血益血以收耗散之氣以芩連苦寒除邪氣之盛為君歸身地黃養血涼血為臣五味酸寒體浮收瞳散地骨皮天冬瀉熱補氣凡目暴赤腫以防風黃芩為君以瀉火黃連當歸為佐以和血凡目疾暴赤腫以防風羌活柴胡升麻白芷芩連甘草當歸白睛紅加白豆蔻少許凡目久病昏暗以熟地歸根為君在羌活防風甘菊之類雜佐之撥雲湯羌活防風一錢半藁木川芎荊芥一錢葛根細辛柴胡升麻五分知母歸身川柏甘草黃耆各一兩內障是脾虛火盛上加下藥人參五味白芍茯苓白朮濕熱加下藥黃連炒黃芩生地睛痛加歸地黃胸中不利加槐子赤翳加羚角腑祕加大黃百點膏黃連水一大碗煎至半加歸六錢防風八錢蕤仁去皮尖三錢上熬滴水不散加蜜少許點之蔓荊椒眼地黃甘草荊芥麻黃升麻隨所長加之春雪膏點眼朴硝置生腐上蒸待流下瓦器接之地黃丸治不能遠視近視此大除風熱生地天門冬各四兩炒枳殼甘菊各二兩蜜丸茶酒任下局方定志丸治不能近視反能遠視人參遠志菖蒲白茯苓蜜丸瀉青丸治風熱熟乾地黃丸治血少安神駐景丸補腎水車前子菟絲子熟地黃各五兩槐子散治體肥氣盛風熱上行目昏澀槐子黃芩木賊蒼朮末之茶下桔梗丸治太陽衛虛血實瞳人腫痛眼黑肝風盛桔梗一斤牽牛頭末三兩蜜丸水下神仙退翳丸治一切翳暈內外障昏無睛纍效當歸酒洗川芎犀角屑枳實川連蟬蛻栝蔞根薄荷六錢甘菊蛇蛻密蒙花荊芥與甘草煎三味地骨皮三錢洗炒白蒺藜羌活地黃用干酒浸一兩木賊一兩半去節童便浸一宿火干上末煉蜜丸米飲下婦人氣旺者木香湯下之家珍方治眼梢赤川連白礬三錢銅緑五分密陀僧一錢輕粉少許末貼之又方黃丹白礬等分驗方治痘後目上翳穀精草蛇殼緑豆殼天花粉上等分末粟米泔浸煮蜜柿干為度食之羊肝丸治一切目病不問障盲白乳羊肝一具竹刀刮去膜黃連一兩甘菊防風薄荷去梗荊芥羌活當歸川芎各三錢上為末羊肝搗丸漿水下爛翳驗方茜根燒灰燈草點之須臾大痛以百節草刮去之七寶膏珍珠珊瑚甘石三味煅以連水淬七次石沙腦子麝香蕤仁去殼各一錢研細點之五十四耳因風熱氣虛火升腎寄竅於耳證治風毒耳痛全蠍一兩生薑二兩切作四方塊同炒去薑末之湯點聤耳耳膿出用桑螵蛸一個火炙麝香二分五釐糝之又加枯礬吹之良蟲入耳中麻油灌又貓尿灌耳內好五十五鼻因證鼻為肺之竅同心肺上病而不利也有寒有熱寒邪傷於皮毛氣不利而壅塞熱壅清道酒渣鼻乃血熱入肺齆鼻息肉乃肺氣盛鼻淵膽移熱於腦則辛頞鼻淵治寒邪傷者宜先散寒邪後補衛氣使心肺之氣交通宜以通氣湯羌活獨活防風葛根升麻各三錢川芎一錢蒼朮炙草各三錢黃耆四錢白芷一錢黃連黃柏酒渣鼻方四物湯黃芩酒炒紅花水煎服又方乳香硫黃以蘿蔔內煨輕粉烏頭尖酥調敷又方鴨嘴膽礬敷齆鼻息肉枯礬研為面脂綿裹塞鼻數目自消又方瓜蒂末綿囊裹塞亦可木通細辛炮附子蜜和綿裹內鼻中亦可防風通聖散加好三稜山萸肉海藻並用酒浸炒末每一錢五分鼻淵薄荷黃連二錢半通聖散一兩孩兒茶服五十六齒因證夫齒乃腎之標骨之餘上齦隸於坤土足陽明之貫絡也下齦隸於庚金手陽明之貫絡也手陽明惡寒飲而喜熱足陽明喜寒飲而惡熱腎衰則豁腎固則堅大腸壅齒乃為之浮大腸虛齒為之宣露熱甚則齒動齦脫作痛不已寒邪風邪客於腦則腦痛項筋急粗露疼痛蚛餌則缺少而色變癢痛治羌活散麻黃去根節羌活一錢半防風三錢半細辛五分升麻柴胡五分當歸蒼朮五分白芷三錢桂枝黃連骨灰三錢上先以湯漱口淨擦之牙疼方土蒺藜半兩青鹽三錢漿水二碗煎熱服又方烏頭熟艾蔥三株川椒十數粒上濃煎漱有膿痰出而安治蟲散氣草蓽撥末木鱉肉上同研搐鼻治風氣走疰痛藁本剪草細辛熱漱愈治骨槽風皂角不蚛去子杏仁燒存性上每味一兩入青鹽一錢揩用治風蚛牙以北棗一枚去核入巴豆一粒合成文武火炙如炭放地上良久研細以紙捻入蚛孔十次五十七結燥因火邪伏於血中耗散真陰津液虧少夫腎主大便腎主津液液潤則大便如常證小腸移熱於大腸為虙瘕為沉虙瘕是便澀閉也脈治燥熱有云脾脈沉數下連於尺臟中有熱亦有吐瀉後腸胃虛服燥熱藥多者宜承氣湯下之風燥有云右尺浮也內肺受風傳入腸中宜麻仁丸陽結脈數大而實宜苦寒類治陰結陰燥欲坐井中二腎脈搐之必虛或沉細而遲者是也如有陰證煩躁脈堅實陽藥中少加苦寒以去熱燥有年老氣弱津液不足而結有産婦內亡津液而結二證並宜地黃丸大便閉小便澀數謂之脾約約者脾血耗燥肺金受火無所攝脾津液故竭理宜養血潤燥有産婦便祕脈沉細服柏知母附子而愈外有腳氣虛寒氣實皆相似亦大便不通腎惡燥急食辛以調之結者散之如少陰不得大便以辛潤之太陰不得大便以苦瀉之如食傷腹滿腹響是也陽結者散之陰結者熱之潤腸丸麻仁桃仁去皮尖各一兩羌活歸尾大黃煨各半兩除二仁別研餘味共搗火枯蜜丸梧子大湯下如不大便邪氣盛急加大黃酒製如血燥而大便乾燥加桃仁大黃酒製如風結燥大便不行加麻仁大黃如風澀加皂角仁秦艽大黃如脈澀身覺有短氣加郁李仁大黃如陰結寒證加乾薑附子有云大便不通有五證熱冷氣風濕尺脈伏也宜溫補之風老人産婦祕有虛實能飲食小便赤為實實者祕物也麻仁七宣等主之見前不能飲食小便清為虛虛者祕氣也厚朴湯主之厚朴半夏神麯甘草三兩白朮五兩枳實陳皮一兩五十八痔漏因證因蟲就燥也乃木乘火勢而侮燥金歸於大腸為病皆風熱燥濕為之也蓋腸風痔漏總辭也分之則異若破者則謂之漏大便祕澀必作大痛此由風熱乘食飽不通氣逼大腸而作也受病者燥氣也為病者胃濕也胃刑大腸則化燥化以乘燥熱之實勝風附熱而來是風燥濕熱四氣而合故大腸頭成塊濕也大痛者風也結燥者主病兼受火邪也不通者熱也治以苦寒瀉火辛溫和血潤燥疏風止痛祕方涼血為主四君子四物黃芩涼大腸枳殼寬大腸槐角涼血生血升麻秦艽白朮丸秦艽去蘆皂角各一兩去皮燒存性白朮五錢當歸半兩酒洗桃仁一兩去皮尖地榆三錢破血枳殼麩炒泄胃澤瀉各半兩滲濕大黃四錢麵糊丸米湯下百丸空心服以膳壓之氣滯加檳榔木香濕熱勝加柏一云凡痔漏蒼朮防風為君甘草白芍為佐蒼朮澤瀉丸蒼朮四兩枳子澤瀉各二兩地榆皂角飯丸淋洗用天仙子荊芥穗川椒蔓荊子煎洗祕方五味子朴硝蓮房桑寄枝先熏後洗敷腫木鱉子五味子為末調敷腸風塞藥爐甘石煅牡蠣粉痔漏方好臘茶腦子同研津調紙花貼上除根用後方又方白礬枯二錢生二錢乳香三錢真香油同研為膏紙花貼如便祕枳實當歸湯下三黃丸皂角散治痔漏脫肛黃牛角䚡一個切蛇蛻一條皂角小五個穿山甲上並切入瓷瓶泥固濟候乾先以火燒煙出方以大火煅紅出冷研細胡桃酒下臨臥引出蟲五更卻以酒下二錢脈痔方血自肛門邊另作竅烏頭炮去皮尖黃連各一兩又方亦妙槐花荊芥石菖蒲各一兩酒痔連丸黃連一味酒浸酒煮酒丸飲下腐痔核即為水硼砂煅輕粉爐甘石煅上以朴硝淬洗辰砂或加信煅敷外四圍點核上貼痔麝香樟腦硃砂研入山田螺內待成水抹頭不拘遍數以干為度治酒痔下血不止乾絲瓜一枚連皮子燒存性為末酒下二錢痔血不止檢漆根灰空心下木槿散治痔專封口能幹木槿花八九月採陰乾用葉杵敷亦可又方當歸一兩黃連二兩烏龜一個酒煮乾日乾為末蜜丸皂子大治脫肛方理省藤桑白皮白礬煎洗自收因治玉莖挺長亦濕熱小柴胡加黃連有塊加青皮外用熱絲瓜汁調五味子敷五十九婦人産胎脈平而虛者乳子陰搏陽別者妊子搏者近於下別者出於上血氣和調陽施陰化也少陰脈動甚者妊少陰心脈也尺中按之不絶者妊三部脈浮沉正等按之無絶者妊妊娠初時寸微小呼吸五至三月而尺脈數脈滑疾重以手按之散者蓋三月也脈重手按之不散但疾不滑者五月也寸微關滑尺帶數流利往來並雀啄是妊左沉實疾大皆為男縱者主雙右沉實疾大皆為女橫者主雙脈浮腹痛痛引腰脊為欲生也脈一呼三至曰離經沉細而滑亦同尺脈轉急如切繩者皆便生也妊三月而渴脈反遲欲為水分復腹痛者必墮妊五月六月脈數必壞脈緊必胞滿脈遲必水壞為腫妊六七月脈弦發熱惡寒其胎愈腹腹痛小腹如扇子臟開故也當溫之以附子妊六七月暴下鬥余水必倚而墮妊七八月脈實大牢強弦者生沉細者死妊十月足身熱脈亂者吉少陰脈浮而緊緊則疝瘕腹中痛半産而墮傷浮則亡血絶産惡寒脈微澀為無子脈弦大為無子血氣虛不足之故也新産脈沉小滑者生實大強急者死沉細附骨者生數疾不調死新産因得熱病脈懸小四肢溫者生寒清者死新産因傷寒中風脈實大浮緩者生小急者死脈得浮緊當身痛不痛腹鳴者當陰吹寸口浮而弱浮為虛弱無血浮短氣弱有熱趺陽浮而澀浮氣喘澀有寒少陰微而弱微少血弱生風微弱相搏陰中惡寒胃氣不泄吹而正喧此穀氣之寒也膏發導之少陰滑而數陰中必瘡少陰脈弦白腸必挺核少陰浮而動浮虛動痛脫下因證治胎墜因虛而熱轉胞乃血虛有痰胎漏逼胞致小便不利溺出不知時因痰胎避而下因血氣不能升四物加貝母滑石痰加二陳惡阻因痰血相搏半夏湯主之妊娠腹脹乃氣不利而虛有熱炒枳殼黃芩白朮妊娠寒熱小柴胡去半夏胎痛乃血少四物香附紫蘇湯安胎大妙胎衣不下或子死胎中或血衝上昏悶或暴下血胞幹不生半夏一兩半肉桂七錢半大黃五錢桃仁三十去皮尖先服四物三兩次服煎湯姜煎不效再服又半夏白蘞丸之下死胎肉桂二錢麝香五分同下又方朴硝半兩童便下欲墮方肉桂一兩栝蔞一兩二錢牛膝一兩瞿麥半兩絶産方蠶種紙一尺燒灰醋湯調服永不孕産難産乃敗血裹其子麝香一錢鹽豉一兩青布裹燒令紅捶為末稱錘燒紅淬酒下一錢又百草霜香白芷伏龍肝單用童便醋調下未下再服貝母白蒺藜活石葵子並治之産後陰脫乃氣血下溜四物蝟皮各半兩牡蠣煅黃芩二兩或加升麻飲下蛇床子布裹尉妙烏賊骨硫黃五味子共末糝患處産後血暈因暴虛素有痰飲瘀血隨氣上攻芎歸湯治暴虛童便下治瘀血荊芥下清魂散治虛澤蘭葉人參一兩荊芥一兩川芎當歸半兩溫酒灌下五靈脂荊芥童便下鹿角灰酒下半夏茯苓湯治痰飲牡丹散牡丹皮大黃蒸芒硝一兩冬瓜子半合桃仁二十個水煎服浮腫是胎前宿有寒濕茯苓白朮白芍當歸陳鯉魚如法又名胎水俗名子腫如腫滿狀産後因敗血化水或血虛氣滯喘急因營血暴竭衛氣無主獨聚於肺此名孤陽絶陰必死因敗血上熏於肺奪命丹主之因傷風寒者旋覆花湯主之産後不語因敗血迷心竅産後口鼻黑氣起及衄因胃氣絶肺敗氣消血散亂入諸經卻還不得死矣子煩二火為之病則苦煩悶麥門冬茯苓黃芩防風竹葉心痛因宿寒搏血血凝其氣五靈脂蒲黃醋下子癇佚漏阻因事下血胎幹不動奔上搶心腹中急迫返魂丹達生散天仙方産婦臨月未涎者凡有病先以黃芩白朮安胎然後用治病藥肌熱者黃芩黃連黃耆人參腹痛者白芍藥甘草感冒依解利産後諸病忌用白芍以黃芩柴胡主之內惡物上衝胸脅痛者大黃桃仁血刺痛者當歸內傷發熱者黃連渴者茯苓一切諸病皆依前法唯渴者去半夏喘咳去參腹脹忌甘草産後身熱血證一同傷寒若傷寒內有痛處脈弦而健宜解傷寒血虛無疼脈弱而澀宜補其血六十帶下脈因濕熱結於肺津液湧溢入小腸為赤入大腸為白然任脈自胞上過帶脈貫於臍上沖任督三脈同起而異行一源而三歧皆絡帶脈統於篡戶因余經往來遺熱於帶脈之間熱者血也血積多日不流從金之化即為白淫治法同濕證以十棗禹功降火流濕之劑良矣因痰積下流滲入膀胱肥人多有之二陳湯加升提為主證治三陽其氣俱欲竭血海將枯滑物下流其有一切虛寒之證脈洪大而澀按之全無宜以溫養之李先生之酒煮當歸丸治此證血虛多加四物氣虛多加參術滑甚者以龍骨赤石脂澀之外有蟲唇瘡亦淋露白汁小胸丸治濕熱帶下下之苦楝丸調之苦楝酒浸茴香炒當歸等分酒糊丸梧子大酒下腰腿痛加四物四兩羌活防風各一兩虛加參耆甘草或加白芍酒煮當歸丸治一切虛證上中下元氣俱竭噦嘔不止胃虛之極脈洪大無力按之空虛或不鼓皆中寒之證當歸一兩茴香半兩黑附炮良薑各七錢上四味銼細以酒一升半煮至酒盡焙乾炒黃鹽丁香苦楝生甘草炙各半兩全蠍三錢柴胡二錢升麻一錢木香一錢玄胡四錢上九味同前酒煮四味俱末酒煮麵糊丸空心淡醋湯送下固真丸治臍腹冷痛目中溜火此皆寒濕乘其胞內汁輕伏火白石脂一錢以火燒赤水飛研細末白龍骨一錢二味以枯以濕乾薑炮四錢瀉寒水黃柏半錢因用引導柴胡本經使一錢當歸一錢和血脈白芍半錢導之人參黃耆虛甚加之上白石龍骨水飛研細外余同極細水煮麵丸雞頭大日乾空心湯下以膳壓之忌生冷油膩濕面血海將枯加白葵花七朵郁李仁潤燥而滋津液不思飲食加五味子衍義方治白膿帶下此腸胃有膿也去盡膿自安紅葵根白芷赤芍藥白礬蠟丸米飲下又方治白帶白濁以黃荊子炒焦為末酒下張用瓜蒂散吐寒痰升氣導水丸下濕熱甘露散調之利濕熱燥濕痰方治肥人海石半夏南星治痰黃柏治濕痰蒼朮燥濕痰川芎升之椿皮香附調氣牛膝風痛加之刮熱方治瘦人黃柏相火滑石椿皮川芎黃連性躁滑者加龍骨加石脂滯者加葵花血虛加四物甚用吐下吐用二陳加蒼朮下用白朮調治神祐丸六十一經候脈經脈不行者血生於心因憂愁思慮則傷心心氣停結故血閉不行左寸沉結宜調心氣通心經使血生而自通或因墮胎或産多共血先少而後不通此為血枯脈兩尺弱小宜生血因證血隨氣行結為塊日漸長宜散之久發盜汗致血脈乾枯而經不通宜補血是汗出於心血生於心血與汗出也久患潮熱則血枯燥蓋血為熱所消寒熱去則血自生脾胃不和飲食減少則血不生血者飲食所化經云二陽之病發心脾女子不月血為氣引而行血之來而先有病皆氣之患也來而後有病者皆血之虛也病出意外皆血之熱也治將來作痛乃氣實也桃仁紅花香附枳殼川連不及期者乃血熱也四物加川連過期有二乃血少與痰多也血少芎歸參紫黑成塊加連痰多色淡也肥人多有二陳加蒼朮香附川芎閉而不行乃虛而熱來成塊乃氣之滯錯經妄行乃氣之亂六十二崩漏脈洪數而疾漏血下赤白日下數升脈急疾者死遲者生緊大者死虛小者生因治熱血熱則流虛虛則下溜蓋陰虛陽搏謂之崩由脾胃有虧氣下陷於腎與相火相合濕熱下迫脈洪而疾先見寒熱往來心煩不得眠治宜大補脾胃而升其血氣蓋心氣不足其火大熾在於血脈之中致脾胃有虧火乘其中形容似不病者此心病也治法同前微加鎮墜心火之藥補陰瀉陽經自止矣蓋腎心真陰虛不能鎮守包絡相火故血走而崩也是氣血俱虛為大寒之證輕手其脈數疾舉指弦緊或澀皆陽脫也陰火亦云或渴此皆陰燥宜溫之補之升之脾胃者血氣之根本周榮滋身心者血之府脈者人之神俱不足則生火故也治升陽散火除濕羌活防風升麻柴胡川芎涼血瀉相火生地黃連黃柏黃芩知母和血補血酒洗當歸黃耆胃口客寒當心痛加草豆蔻炒曲氣短加參術冬寒加麻黃桂枝血氣俱脫大寒證加附子肉桂不止加阿膠艾葉或加丁香乾薑四物加荊芥穗發灰治血不止如神單味蒲黃炒黑亦妙治標方急則治其標凡藥須炒黑血見黑則止白芷湯調棕櫚灰後用四物湯加姜調治五靈脂末亦可凌霄花末酒下治本方四物湯黃連熱則加之參耆虛加之乾薑寒則加之黃芩熱則加之胎漏方血虛有熱地黃生一半熟一半白朮一兩黃芩炒枳殼各半兩煎湯調下地黃末六十三小兒證脈八至者平九至者傷十至者困緊為風癇沉為乳不消弦急客忤氣沉而數者骨間有熱脈小大便赤青飧泄手足溫者生寒者難已證有四曰驚疳吐瀉病其頭毛皆上逆者死汗出如珠著身不流者死因治有二曰飽暖小兒十六歲前稟純陽氣為熱多也小兒腸胃常脆飽食難化食則生積為痰肝則有餘腎尚不足肝病亦多也張皆歸之濕熱常以牽牛大黃木通為丸以治諸病驚因熱痰主急當瀉降火痰丸養血湯下因脾虛主慢當補硃砂安神丸參朮湯下疳因土熱也川連去熱二錢胡黃連去果子積半錢阿魏去肉積醋浸神麯各一錢丸如米大啼因肝熱薑汁炒川連甘草竹葉煎服吐瀉脾虛斑疹是火與前丹疹條下同夫惡血留於命門伏於一隅待氣虛血虛脾損相火生焉二火交熾煎熬太陰其證呵缺寒熱噴嚏手足梢冷睡驚俱屬少陽相火少陰君火顯證自吐吐瀉者邪出也即吉宜消毒解火大便不利當微利之身溫者順身涼者逆痘同疹論切忌熱藥亦勿泥宜分氣血虛則補之氣虛四君血虛四物吐瀉少食為裡虛陷白倒靨麵灰白為表虛不吐瀉能食為實宜解毒芩連等是也實則更補必結癰膿也解毒方絲瓜升麻白芍酒炒甘草糖球黑豆犀角硃砂單用絲瓜煮湯亦可血痢三黃湯食積利用炒曲蒼朮白芍黃芩白朮甘草陳皮茯苓下保和丸治小兒蟲用胡黃連川連蕪荑山楂神麯青陳皮蘆薈和丸急慢驚風辰砂一顆全蠍一枚生犬血快研服六十四雜證濕熱相火病多土火病多氣常有餘血常不足肥人血多濕多瘦人氣實熱多白者肺氣弱血不足黑者腎氣有餘忌黃耆熱傷血不能養筋故為拘攣濕傷筋不能束骨故為痿弱氣屬陽無寒之理下用補相間勞病忌寒藥此東垣之旨也寒不得熱是無火也熱不得寒是無水也肺癰非吐不可辛苦飢飽疼痛皆傷血服藥之力峻須用酸收指甲卷是血少不養筋身如被打濕傷血也亦有血虛而痛腑病責臟用臟病責腑用氣血弱遠枳殼以其損氣也血盛忌丁香以其益氣也治病先調氣病分氣血陰陽晝增夜靜是陽氣病而血不病夜增晝靜是陰血病而氣不病夜靜日惡寒是陰上溢於陽日夜並惡寒是陰部大盛兼有其陽當瀉其寒峻補其陽夜靜日熱是陽盛於本部日靜夜惡寒是陰盛於本部日安夜躁煩是陽氣下溜於陰中當瀉其陽峻補其虛日惡寒夜煩躁為陰陽交飲食不入必死傷寒中暑與傷飲食一般人火正治諸龍火反治諸病有郁治之可開噁心有熱有痰有虛悲者火乘金陽絶則陰虧陰氣若盛陽無暴絶之理虛勞不受補者死諸病發熱者風寒暑濕燥火七情皆能發熱寒濕同性火燥同途非也寒宜溫之濕宜燥之火宜降之涼之燥宜潤之諸病尋痰火痰火生異證診脈觀形察證三者殊途不可執一諸病先睹胃氣六十五雜治惡寒有濕痰積中脈沉緩抑遏陽氣不得外泄身必惡寒宜江茶入香油薑汁吐其痰以通經散去麻硝黃加歸地黃伏脈有熱甚而血虛亦惡寒脈沉而澀宜四物倍地黃朮耆柏參甘草戰栗有熱一陽發病少氣善咳善泄其傳為心掣掣動也子母傳故泄理中主之勞風法在肺下使人強上冥視勞生熱唾出若涕感風惡風而振寒肺主皮毛宜通經散加半夏歸痹氣乃陰氣盛而血不榮故身寒如水中皆虛寒之證宜薑附五實五虛脈盛脈細心皮熱皮寒肺腹脹飲食不入脾悶瞀氣少肝前後不通泄利前後腎陰滯於陽有作勞而冷飲酒醉次日膈痛似飢過飽遂成左脅痛有塊脈細澀沉數服韭汁桃仁童便等安又有如前左乳痛有核服石膏白芷乾葛栝蔞蜂房等陽滯於陰有事不如意衄如注脈浮數重而大且芤四物加萱草薑汁飲之有逃難飲食下血脈沉澀似數以鬱金芎芷蒼芍葛香附右腎屬火補之以巴戟杜仲之類左腎屬水補之以地黃山茱黃柏之類六十六臟證肝胃脘當心而痛上支兩脅肝經膈咽不通飲食不下土衰病甚則耳鳴眩轉目不視人善僵嗌僕裡急緛戾脅痛嘔泄令人善怒也虛則目無所見耳無所聞善恐如人將捕之心胸中熱嗌乾胠滿皮膚痛寒熱咳喘驚或狂妄一切血證胸中痛脅支滿膺背肩胛間痛虛則胸腹大脅下與腰背相引而痛脾跗腫骨痛陰痹腰脊頭項痛大便難積飲痞膈霍亂吐下飧泄腸鳴脾熱之主虛肺骨節內變右胠脅痛寒侵於中鶩溏心脅滿引小腹不可反側嗌乾面塵脫色丈夫癲疝婦人小腹痛實則咳逆肩背痛虛則少氣不能報息耳聾咽乾腎腰腿痛大關節不利屈身不便腹滿痞堅寐汗實則腹脛腫身重虛則胸中滿大小腹痛清厥六十七七情證怒為嘔血飧泄煎厥薄厥胸滿脅痛食則氣逆而不下為喘渴煩心為消脾肥氣目暴盲耳暴閉筋緩怒傷肝為氣逆悲治怒喜為笑毛革焦傷氣不收甚則狂喜傷心為氣緩恐治喜悲為陰縮筋攣肌痹脈痿男為數溲女為血崩酸鼻辛頞泣則臂麻悲傷肺為氣消喜治悲驚為痰涎目睘吐癡癇不省人事驚傷神為氣亂思治驚勞為咽噎喘促嗽血唾血腰重痛骨痿男少精女不月勞傷血氣耗逸治勞思為不眠好臥昏瞀三焦痞塞咽喉不利嘔苦筋痿白淫不嗜飲食思傷脾為氣結怒治思恐傷腎為氣不行思治恐六十八雜脈寸口脈但實者心勞寸口脈沉胸中氣短浮而絶者氣闢大而滑中有短氣數而不加六至者為滑微弱者少氣尺脈沉滑者寸白蟲男女皆當以左手尺脈常弱右手尺脈常盛為平陽盛陰虛下之安二寸實大尺短少此傷寒之邪乘其裡虛而入於腑者是也如尺脈弱寸強則陰不足陽往乘之下之安汗之死余以類推脈俱弦指下又虛脾胃虛弱證食少而渴痞腹中痛窄狹二便不調脈俱沉緊按之不鼓膀胱勝小腸也或瀉利不止而腹脹或純白赤或雜血便多不渴精神少或面白脫色此失血之故或面黃而氣短此元氣損少之故是丙火小腸為壬膀胱所克而外走也屯火投於水大寒之證宜溫之則愈薑附各半兩赤石脂四錢半飛硃砂一兩研茯苓湯下二三十丸脈諸按之不鼓為虛寒二寸短少謂之陽不足病在下脈諸搏手為寒涼或寒藥治之脈虛亦薑附脈二手相似而右為盛皆胃氣虛二寸求之脾胃當從陰引陽脈中少有力盛甚則似止胸中元氣不及脈貴有神神者不問遲數之病中外有力者為神也脈諸短為虛二關脈實上不至發汗下不至利大便脈諸大為虛二關脈沉細純虛也宜補之脈澀與弦而大按之有力為實無力為虛脈沉遲寸微滑者為實二尺不見或短少乃食塞當吐之凡脈盛大以澀外有寒證名寒中乃寒獨留血脈泣故大也脈大而實不可益氣滑脈關以上見為大熱關以下見為大寒火併於上以丙火化火併於下以壬水化雜病脈沉者多屬痰宜吐傷寒寸脈浮滑者有痰宜吐勞熱脈沉細無火者死陽脈浮陰脈弱者則血虛血虛則筋急凡有者為實無者為虛假令脈浮則為陽盛陰虛脈沉則為陰盛陽虛此有則彼無彼有則此無又如弦則木實金虧土虛浮診見者為腑為上部為陽按之見者為臟為下部為陰脈來者為陽為氣去者為陰為血假如脈來疾去遲為陽有餘而陰不足也故曰外實內虛是也出以候外疾為實入以候內遲為虛寸微尺緊為虛損陰盛陽微之故也諸浮脈無根死臟腑無根故也長病脈虛而澀虛而滑虛而緩微而伏浮而結浮而滑實而大實而滑細而軟如蛛絲羹上肥如屋漏如雀啄如霹靂如貫珠如水淹以上此脈得之則生反之則死一本如水淹之下注曰皆死脈也無以上此脈得之則生反之則死三句有識者詳之卒病與長病條下反之則死人病甚脈不調難差脈洪者易已形脈相應肥人脈細欲絶者死瘦人脈躁者死身溫脈滑者死身滑脈澀者死身小脈大者死身大脈小者死身短脈長者死身長脈短者死六十九察視黑氣起於耳目鼻上漸入口者死白色者亦然赤色見於耳目頞上五日死張口如魚出氣不反者死循衣摸縫者死無熱妄語者死遺尿不知者死爪甲青者死爪甲肉黑者死舌卷卵縮者死眉傾髮直者死唇反人中滿者死陰陽俱閉失聲者死神氣不守聲嘶者死汗出不流者死口臭不可近者死回目直視肩息者死齒忽黑色面青目黑面青目黃面青目白面青唇黑者皆死面白目黑面白目白皆死面赤目黃面赤目白死而黑目白死面黑脅滿不能反側者死面黑唇青死面黑目青死面黃目白面黃目青面黃目黑死以上黑如燃白如枯骨赤似血青似草方為死候心絶肩息回盼目直一日死肺絶氣去不快口如魚三日死骨絶腰脊痛不可反側五日死脾絶口冷足腫脹泄十二日死腎絶大便赤澀下血耳干腳浮舌腫者六日死筋絶魂驚虛恐手足爪甲青善呼罵不休九日死腸絶髮直汗出不止不得屈伸六日死肝絶恐俱伏臥目直面青八日死又即時死胃絶齒落目黃者七日死七十汗脈沉微細弱不可汗沉細為在裡微弱氣血虛浮而緊法當身痛當以汗解假令尺脈遲者不可汗此血微少故也陰病脈細沉數不可汗病在裡之故也傷寒風濕素傷於風復傷於熱四肢不收頭痛身熱常汗不解治在少陰厥陰不可汗汗之譫語內煩不得臥善驚目亂無精光傷寒濕溫素傷於寒因而中暍若兩脛冷腹滿頭目痛妄言治在足太陰不可汗汗出必不能言耳聾不知痛所在身青面變死傷寒頭痛形象中風常微汗出又自嘔者心懊憹發汗則痙傷寒脈弦細頭痛而反熱此屬少陽不可汗太陽與少陽並病頭項強痛或眩冒心下痞堅不可汗少陰病咳而下利譫語者此強汗之故也咽中閉塞不可汗汗之則吐血厥陰不可汗汗之聲亂咽嘶亡血家不可汗汗之則寒栗衄不可汗汗之必額陷直視淋家不可汗汗之必便血瘡家不可汗汗之則痙汗家不可重汗汗之必恍惚脈短者死冬時發其汗必吐利口瘡下利清穀不可汗汗之必脹滿咳而小便利或誤汗之則厥逆諸逆發汗微者難愈劇者言亂睛眩者死動氣在不問左右上下一切不可汗脈浮大可汗問病者設利為虛而不可汗也浮而緊可汗太陽病脈浮弱可汗浮而數者亦可汗脈遲汗出多微惡寒表未解可汗熱如瘧此為陽明脈浮虛可汗身痛清便自調可汗

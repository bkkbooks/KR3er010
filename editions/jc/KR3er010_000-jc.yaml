body:
  text: 繆序余自歸里後杜門不與世事接先太宜人病痰飲延葉眉壽治歷四年弗痊而眉壽謂為痼疾難效因遍覽方書頗會其旨揀方以治不一年而瘳後遂旁收博採窮幽極渺而於長沙河間東垣子和丹溪諸書尤三致意焉竊嘗謂醫之有長沙時中之聖也而四家並峙猶清任和之各成其聖偏焉而至者也學不從此參究猶航斷港絕潢以望至於海也其能之乎但四家自河間東垣而外子和文多缺略未為全書丹溪著作類出門人記載惟聞脈因證治一書簡而賅約而盡學者循是而窺長沙如得其船與楫沿而不止固自不可量也而流傳絕少歷三十年未獲一嗒心常怏怏歲乙未客有持來示余欲廣諸同好亟請付梓不禁欣感交集以為一線靈光忽然湧現真為桑榆之幸因不辭而為之序以弁其首乾隆乙未仲夏吳趨繆遵義書於芝田山房
